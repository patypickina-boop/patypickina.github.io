<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localizador de Parceiros Sema MPDFT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  html, body { height: 100%; }
  body { background: #f4f6f8; color: #222; }

  /* Header */
  header {
    background: #002147;
    color: #fff;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    z-index: 1000;
  }
  header .icon { font-size: 30px; }
  header h1 { font-size: 20px; font-weight: 700; line-height: 1.1; }
  header p { font-size: 13px; opacity: 0.85; }

  /* Layout */
  .app { display: flex; height: calc(100% - 64px); }
  .sidebar {
    width: 420px;
    min-width: 420px;
    background: #fff;
    border-right: 1px solid #e1e4e8;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll { overflow-y: auto; padding: 14px; }
  #map { flex: 1; height: 100%; background: #ddd; }

  /* Filtros */
  .filters-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 16px; font-weight: 700; color: #002147;
    margin-bottom: 12px;
  }
  .field-row { display: flex; gap: 8px; margin-bottom: 10px; }
  input[type=text], input[type=number] {
    flex: 1; padding: 9px 10px; border: 1px solid #cbd1d6;
    border-radius: 6px; font-size: 13px; outline: none;
  }
  input:focus { border-color: #002147; box-shadow: 0 0 0 2px rgba(0,33,71,0.12); }
  .btn {
    padding: 9px 12px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-blue { background: #002147; color: #fff; }
  .btn-blue:hover { background: #013a78; }
  .btn-pink { background: #e91e63; color: #fff; }
  .btn-pink:hover { background: #c1134e; }
  .btn-gray { background: #eef1f4; color: #333; }
  .btn-gray:hover { background: #e1e6eb; }
  .btn-group { display: flex; gap: 8px; margin-bottom: 12px; }

  .slider-block { margin-bottom: 14px; }
  .slider-block label { font-size: 13px; font-weight: 600; color: #333; display: block; margin-bottom: 6px; }
  input[type=range] { width: 100%; accent-color: #002147; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .pill {
    padding: 6px 11px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 2px solid transparent; color: #fff; user-select: none;
  }
  .pill.active { outline: 2px solid #002147; outline-offset: 1px; }
  .pill.todos { background: #6c757d; }
  .pill.servicos { background: #0d6efd; }
  .pill.pecuniaria { background: #198754; }
  .pill.saude { background: #dc3545; }
  .pill.palestras { background: #6f42c1; }

  /* Status */
  .status {
    padding: 10px 14px; background: #f4f6f8; border-top: 1px solid #e1e4e8;
    font-size: 13px; color: #555; font-weight: 600;
  }

  /* Cards */
  .results { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: #fff; border: 1px solid #e1e4e8; border-radius: 8px;
    padding: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card h3 { font-size: 14px; color: #111; margin-bottom: 4px; }
  .card .meta { font-size: 12px; color: #555; margin-bottom: 2px; }
  .card .badges { margin: 8px 0; display: flex; flex-wrap: wrap; gap: 5px; }
  .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 12px; color: #fff; font-weight: 600;
  }
  .badge.servicos { background: #0d6efd; }
  .badge.pecuniaria { background: #198754; }
  .badge.saude { background: #dc3545; }
  .badge.palestras { background: #6f42c1; }
  .card .map-link { font-size: 12px; color: #002147; text-decoration: none; font-weight: 600; }
  .card .map-link:hover { text-decoration: underline; }
  .card .dist { font-size: 11px; color: #888; }

  .error-msg {
    background: #fff3f3; border: 1px solid #f5c2c2; color: #a32020;
    padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 12px;
  }
  .loading { text-align: center; padding: 20px; color: #666; font-size: 13px; }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; height: 55%; }
    #map { height: 45%; }
  }
</style>
</head>
<body>

<header>
  <div class="icon">🤝</div>
  <div>
    <h1>Localizador de Parceiros Sema MPDFT</h1>
    <p>Encontre instituições parceiras</p>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-scroll">
      <div class="filters-title">🔍 Filtros</div>

      <div class="field-row">
        <input type="text" id="searchInput" placeholder="Buscar por nome, endereço, programa...">
        <button class="btn btn-blue" id="searchBtn">🔎</button>
      </div>

      <div class="field-row">
        <input type="text" id="cepInput" placeholder="72426-075" value="72426-075">
        <button class="btn btn-pink" id="cepBtn">📍 Buscar Localização</button>
      </div>

      <div class="btn-group">
        <button class="btn btn-gray" id="gpsBtn">📡 GPS</button>
        <button class="btn btn-gray" id="clearBtn">🧹 Limpar</button>
      </div>

      <div class="slider-block">
        <label id="radiusLabel">Raio: Sem limite</label>
        <input type="range" id="radiusSlider" min="0" max="200" value="0" step="5">
      </div>

      <div class="pills" id="pills">
        <span class="pill todos active" data-cat="Todos">Todos</span>
        <span class="pill servicos" data-cat="Prestação de Serviços">Prestação de Serviços</span>
        <span class="pill pecuniaria" data-cat="Prestação Pecuniária">Prestação Pecuniária</span>
        <span class="pill saude" data-cat="Programa de Saúde">Programa de Saúde</span>
        <span class="pill palestras" data-cat="Palestras">Palestras</span>
      </div>

      <div id="errorBox"></div>
      <div id="results" class="results">
        <div class="loading">Carregando instituições...</div>
      </div>
    </div>
    <div class="status" id="status">0 instituições encontradas</div>
  </aside>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
const CACHE_KEY = 'sema_mpdft_geocode_cache_v23';
const CATEGORIES = ['Prestação de Serviços','Prestação Pecuniária','Programa de Saúde','Palestras'];

let allData = [];
let map, markersLayer;
let userLat = null, userLng = null;
let activeCategory = 'Todos';
let searchQuery = '';
let radiusKm = 0; // 0 = sem limite

const map = L.map('map').setView([-15.78, -47.93], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap', maxZoom: 19
}).addTo(map);
markersLayer = L.layerGroup().addTo(map);

function catClass(cat){
  if(cat.includes('Servi')) return 'servicos';
  if(cat.includes('Pecuni')) return 'pecuniaria';
  if(cat.includes('Saúde')||cat.includes('Saude')) return 'saude';
  if(cat.includes('Palestra')) return 'palestras';
  return 'servicos';
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371, toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function getCache(){ try{ return JSON.parse(localStorage.getItem(CACHE_KEY))||{}; }catch(e){ return {}; } }
function setCache(key,val){ const c=getCache(); c[key]=val; localStorage.setItem(CACHE_KEY, JSON.stringify(c)); }

async function geocode(address){
  if(!address) return null;
  const cache=getCache();
  if(cache[address]) return cache[address];
  try{
    const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(address+', Brasil');
    const r=await fetch(url,{headers:{'Accept-Language':'pt-BR'}});
    const j=await r.json();
    if(j && j.length){
      const res={lat:parseFloat(j[0].lat), lng:parseFloat(j[0].lon)};
      setCache(address,res); return res;
    }
  }catch(e){ console.warn('Geocode fail',address,e); }
  return null;
}

async function loadSheet(){
  // Endpoint gviz - mais resiliente
  const query='SELECT *';
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&tq='+encodeURIComponent(query);
  try{
    const r=await fetch(url);
    const text=await r.text();
    const json=JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}')+1));
    const cols=(json.table.cols||[]).map(c=>(c.label||c.id||'').trim().toLowerCase());
    const rows=json.table.rows||[];
    return rows.map(row=>{
      const obj={};
      (row.c||[]).forEach((cell,i)=>{ obj[cols[i]||('col'+i)] = cell ? (cell.v!==null?cell.v:cell.f||'') : ''; });
      return obj;
    });
  }catch(e){
    console.error('Falha gviz',e);
    throw e;
  }
}

function normalizeRow(row){
  const get=k=>{ for(const key in row){ if(key.toLowerCase().includes(k.toLowerCase())) return row[key]; } return ''; };
  const nome=get('nome')||get('instituicao')||get('razao');
  const endereco=get('endereco')||get('logradouro');
  const cep=get('cep');
  const horario=get('horario')||get('funcionamento');
  const programas=[];
  CATEGORIES.forEach(c=>{
    for(const key in row){
      const v=String(row[key]||'').toLowerCase();
      if(key.toLowerCase().includes(c.toLowerCase().split(' ')[0].toLowerCase()) && v && v!=='não' && v!=='nao' && v!=='-'){
        if(!programas.includes(c)) programas.push(c);
      }
      if(v.includes(c.toLowerCase())){ if(!programas.includes(c)) programas.push(c); }
    }
  });
  if(programas.length===0){
    const progStr=get('programa')||get('categoria');
    CATEGORIES.forEach(c=>{ if(String(progStr).toLowerCase().includes(c.toLowerCase().split(' ')[0].toLowerCase())) programas.push(c); });
  }
  return { nome, endereco, cep, horario, programas, lat:null, lng:null, dist:null };
}

function render(){
  const results=document.getElementById('results');
  results.innerHTML='';
  markersLayer.clearLayers();

  let list=allData.slice();

  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(i=>
      (i.nome||'').toLowerCase().includes(q) ||
      (i.endereco||'').toLowerCase().includes(q) ||
      (i.cep||'').toLowerCase().includes(q) ||
      (i.programas||[]).join(' ').toLowerCase().includes(q)
    );
  }

  if(activeCategory!=='Todos'){
    list=list.filter(i=> (i.programas||[]).some(p=>p.toLowerCase().includes(activeCategory.toLowerCase().split(' ')[0].toLowerCase())));
  }

  if(radiusKm>0 && userLat!=null){
    list=list.filter(i=> i.dist!=null && i.dist<=radiusKm);
  }

  if(userLat!=null){
    list.sort((a,b)=>(a.dist==null?1e9:a.dist)-(b.dist==null?1e9:b.dist));
  }

  document.getElementById('status').textContent = list.length+' instituiç'+(list.length===1?'ão':'ões')+' encontradas';

  if(list.length===0){
    results.innerHTML='<div class="loading">Nenhuma instituição encontrada com os filtros atuais.</div>';
    return;
  }

  list.forEach(i=>{
    const card=document.createElement('div');
    card.className='card';
    let badges=(i.programas||[]).map(p=>'<span class="badge '+catClass(p)+'">'+p+'</span>').join('');
    let distStr = i.dist!=null ? '<div class="dist">📍 Distância: '+i.dist.toFixed(1)+' km</div>' : '';
    card.innerHTML=
      '<h3>'+(i.nome||'Sem nome')+'</h3>'+
      '<div class="meta">🏠 '+(i.endereco||'Endereço não informado')+'</div>'+
      '<div class="meta">📮 CEP: '+(i.cep||'—')+'</div>'+
      '<div class="meta">🕒 '+(i.horario||'Horário não informado')+'</div>'+
      '<div class="badges">'+badges+'</div>'+
      distStr+
      '<a class="map-link" href="#" data-lat="'+(i.lat||'')+'" data-lng="'+(i.lng||'')+'">🗺️ Ver no Mapa</a>';
    results.appendChild(card);

    if(i.lat!=null && i.lng!=null){
      const m=L.marker([i.lat,i.lng]).addTo(markersLayer);
      m.bindPopup('<strong>'+(i.nome||'')+'</strong><br>'+(i.endereco||''));
      card.querySelector('.map-link').addEventListener('click',e=>{
        e.preventDefault(); map.setView([i.lat,i.lng],15); m.openPopup();
      });
    } else {
      card.querySelector('.map-link').addEventListener('click',e=>e.preventDefault());
    }
  });
}

async function processGeocoding(){
  for(const inst of allData){
    if(inst.lat!=null) continue;
    const addr=[inst.endereco, inst.cep, 'Brasil'].filter(Boolean).join(', ');
    const res=await geocode(addr);
    if(res){ inst.lat=res.lat; inst.lng=res.lng;
      if(userLat!=null) inst.dist=haversine(userLat,userLng,res.lat,res.lng);
      render();
    }
    await new Promise(r=>setTimeout(r,1100)); // respeitar rate limit Nominatim
  }
}

async function setUserLocation(lat,lng,label){
  userLat=lat; userLng=lng;
  allData.forEach(i=>{ if(i.lat!=null) i.dist=haversine(lat,lng,i.lat,i.lng); });
  map.setView([lat,lng],12);
  L.circleMarker([lat,lng],{radius:8,color:'#e91e63',fillColor:'#e91e63',fillOpacity:0.8}).addTo(markersLayer).bindPopup('📍 '+label);
  render();
}

async function buscarCEP(cep){
  cep=cep.replace(/\D/g,'');
  if(cep.length!==8){ alert('CEP inválido.'); return; }
  try{
    const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(cep+', Brasil'));
    const j=await r.json();
    if(j && j.length){ setUserLocation(parseFloat(j[0].lat),parseFloat(j[0].lon),'CEP '+cep); }
    else alert('Localização não encontrada para o CEP informado.');
  }catch(e){ alert('Erro ao buscar CEP.'); }
}

function showError(msg){
  document.getElementById('errorBox').innerHTML='<div class="error-msg">'+msg+'</div>';
}
function clearError(){ document.getElementById('errorBox').innerHTML=''; }

// Eventos
document.getElementById('searchInput').addEventListener('input',e=>{ searchQuery=e.target.value.trim(); render(); });
document.getElementById('searchBtn').addEventListener('click',render);
document.getElementById('cepBtn').addEventListener('click',()=>buscarCEP(document.getElementById('cepInput').value));
document.getElementById('cepInput').addEventListener('keypress',e=>{ if(e.key==='Enter') buscarCEP(e.target.value); });

document.getElementById('gpsBtn').addEventListener('click',()=>{
  if(!navigator.geolocation){ alert('Geolocalização não suportada.'); return; }
  navigator.geolocation.getCurrentPosition(pos=>setUserLocation(pos.coords.latitude,pos.coords.longitude,'Sua localização'),()=>alert('Não foi possível obter sua localização.'));
});

document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('searchInput').value='';
  document.getElementById('cepInput').value='';
  searchQuery=''; userLat=null; userLng=null;
  document.getElementById('radiusSlider').value=0;
  document.getElementById('radiusLabel').textContent='Raio: Sem limite';
  radiusKm=0;
  allData.forEach(i=>i.dist=null);
  markersLayer.clearLayers();
  map.setView([-15.78,-47.93],11);
  render();
});

document.getElementById('radiusSlider').addEventListener('input',e=>{
  radiusKm=parseInt(e.target.value,10);
  document.getElementById('radiusLabel').textContent = radiusKm===0 ? 'Raio: Sem limite' : 'Raio: '+radiusKm+' km';
  render();
});

document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');
  activeCategory=p.dataset.cat;
  render();
}));

// Inicialização
(async function init(){
  try{
    const raw=await loadSheet();
    allData=raw.map(normalizeRow).filter(i=>i.nome || i.endereco);
    render();
    processGeocoding();
  }catch(e){
    document.getElementById('results').innerHTML='';
    showError('⚠️ Não foi possível carregar os dados da planilha. Verifique se a planilha está publicada (Arquivo &gt; Compartilhar &gt; Publicar na web) e se o ID está correto. Tente recarregar a página em alguns instantes.');
    document.getElementById('status').textContent='Erro ao carregar dados';
  }
})();
</script>
</body>
</html>
