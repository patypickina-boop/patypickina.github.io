<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localizador de Parceiros Sema MPDFT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root { --header-bg: #003366; }
    body { background-color: #f8f9fa; }
    header { background-color: var(--header-bg); }
    .custom-marker { background: transparent; border: none; }
    .filter-btn { border-width: 2px; font-weight: 500; }
    .filter-btn:hover { opacity: 0.9; }
    #resultsContainer { max-height: 520px; }
    .card-text { font-size: 0.95rem; }
    #map { min-height: 700px; }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.85); z-index: 9999;
      display: flex; justify-content: center; align-items: center; flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-primary fw-bold">Carregando instituições parceiras...</p>
  </div>

  <header class="text-white py-3 shadow">
    <div class="container">
      <h1 class="mb-0 fs-3 fw-bold"><i class="fa-solid fa-handshake me-2"></i>Localizador de Parceiros Sema MPDFT</h1>
      <p class="mb-0 opacity-75">Encontre instituições parceiras</p>
    </div>
  </header>

  <div class="container-fluid mt-4 mb-4">
    <div class="row g-4">
      <div class="col-lg-4 col-md-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label fw-bold"><i class="fa-solid fa-magnifying-glass me-1"></i>Busca</label>
              <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="Nome, endereço ou programa...">
                <button class="btn btn-primary" onclick="handleSearch()" title="Buscar"><i class="fa-solid fa-magnifying-glass"></i></button>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold"><i class="fa-solid fa-location-dot me-1"></i>Localização por CEP</label>
              <div class="input-group mb-2">
                <input type="text" id="cepInput" class="form-control" placeholder="Digite o CEP" maxlength="9">
                <button class="btn btn-info text-white" onclick="buscarLocalizacao()">
                  <i class="fa-solid fa-location-dot me-1"></i>Buscar Localização
                </button>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-secondary btn-sm" onclick="useGPS()">
                  <i class="fa-solid fa-satellite-dish me-1"></i>GPS
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="limpar()">
                  <i class="fa-solid fa-broom me-1"></i>Limpar
                </button>
              </div>
            </div>

            <div class="mb-3">
              <label for="radiusSlider" class="form-label fw-bold">
                <i class="fa-solid fa-circle-notch me-1"></i>Raio: <span id="radiusValue">100 km</span>
              </label>
              <input type="range" class="form-range" id="radiusSlider" min="1" max="100" value="100">
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold d-block">Filtros</label>
              <div id="filterButtons" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>

        <div class="mt-3">
          <h5 class="fw-bold"><i class="fa-solid fa-list me-2"></i>Resultados</h5>
          <div id="resultsContainer"></div>
        </div>
      </div>

      <div class="col-lg-8 col-md-7">
        <div id="map" class="rounded shadow border"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4piiHPoYzoa6AMbnp3cev6lMx_QTFibh79hifYTXNE0F2a_1I4v7yl7a7xkOCGlAh4k52Jl7pHk4o/pub?output=csv';

    const PROGRAM_COLORS = {
      'Prestação de Serviços': '#0d6efd',
      'Prestação Pecuniária': '#198754',
      'Programa de Saúde': '#dc3545',
      'Palestras': '#6f42c1',
      'Outros': '#6c757d'
    };

    const PROGRAM_MAP = {
      'prestação de serviços': 'Prestação de Serviços',
      'prestacao de servicos': 'Prestação de Serviços',
      'serviços': 'Prestação de Serviços',
      'servicos': 'Prestação de Serviços',
      'prestação pecuniária': 'Prestação Pecuniária',
      'prestacao pecuniaria': 'Prestação Pecuniária',
      'pecuniária': 'Prestação Pecuniária',
      'pecuniaria': 'Prestação Pecuniária',
      'programa de saúde': 'Programa de Saúde',
      'programa de saude': 'Programa de Saúde',
      'saúde': 'Programa de Saúde',
      'saude': 'Programa de Saúde',
      'palestras': 'Palestras',
      'palestra': 'Palestras'
    };

    let allInstitutions = [];
    let map, markersLayer, referenceMarker, radiusCircle;
    let currentFilter = 'Todos';
    let currentSearch = '';
    let currentRadius = 100;
    let referencePoint = null;
    const GEOCODE_CACHE_KEY = 'semampdft_geocode_v1';

    function initMap() {
      map = L.map('map').setView([-15.7801, -47.9292], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      markersLayer = L.layerGroup().addTo(map);
    }

    function getGeocodeCache() {
      try { return JSON.parse(localStorage.getItem(GEOCODE_CACHE_KEY) || '{}'); }
      catch (e) { return {}; }
    }

    function setGeocodeCache(cache) {
      localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(cache));
    }

    async function nominatimGeocode(address) {
      const cache = getGeocodeCache();
      if (cache[address]) return cache[address];
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&countrycodes=br&limit=1`;
      try {
        const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data && data.length > 0) {
          const result = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          cache[address] = result;
          setGeocodeCache(cache);
          return result;
        }
      } catch (e) { console.error('Erro Nominatim:', e); }
      return null;
    }

    async function geocodeMissingCoordinates() {
      const missing = allInstitutions.filter(i => !i.hasCoords && i.fullAddress);
      for (const inst of missing) {
        const result = await nominatimGeocode(inst.fullAddress);
        if (result) {
          inst.lat = result.lat;
          inst.lng = result.lng;
          inst.hasCoords = true;
          render();
        }
        await new Promise(r => setTimeout(r, 1100));
      }
    }

    function detectColumns(headers) {
      const lower = headers.map(h => String(h).toLowerCase().trim());
      const find = candidates => {
        for (const c of candidates) {
          const idx = lower.indexOf(c.toLowerCase());
          if (idx >= 0) return headers[idx];
        }
        return null;
      };
      return {
        nome: find(['nome', 'instituição', 'instituicao', 'razão social', 'razao social', 'nome da instituição', 'nome da instituicao']),
        endereco: find(['endereço', 'endereco', 'logradouro', 'rua', 'address', 'endereço completo', 'endereco completo']),
        numero: find(['número', 'numero', 'nº', 'num']),
        bairro: find(['bairro']),
        cidade: find(['cidade', 'localidade', 'municipio', 'município']),
        uf: find(['uf', 'estado']),
        cep: find(['cep', 'cep_formatado']),
        horario: find(['horário', 'horario', 'funcionamento', 'atendimento', 'horário de funcionamento', 'horario de funcionamento']),
        programa: find(['programa', 'programas', 'tipo', 'categoria', 'serviço', 'servico', 'serviços', 'servicos', 'programa/categoria']),
        lat: find(['latitude', 'lat', 'latitud']),
        lng: find(['longitude', 'lng', 'lon', 'long', 'longitud'])
      };
    }

    function formatCEP(cep) {
      const digits = String(cep).replace(/\D/g, '');
      if (digits.length === 8) return `${digits.slice(0, 5)}-${digits.slice(5)}`;
      return digits;
    }

    function parsePrograms(text) {
      if (!text) return ['Outros'];
      const parts = String(text)
        .split(/[-,&/]/)
        .flatMap(p => p.split(/\s+e\s+/i))
        .map(p => p.trim())
        .filter(p => p.length > 0);
      const programs = [];
      parts.forEach(part => {
        const normalized = part.toLowerCase().trim();
        const mapped = PROGRAM_MAP[normalized] || 'Outros';
        if (!programs.includes(mapped)) programs.push(mapped);
      });
      return programs.length ? programs : ['Outros'];
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function createMarkerIcon(color) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="${color}">
        <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 7 13 8 14 1-.98 8-8.75 8-14 0-4.42-3.58-8-8-8z"/>
        <circle cx="12" cy="8" r="3" fill="white"/>
      </svg>`;
      return L.divIcon({ html: svg, className: 'custom-marker', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32] });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function buildAddress(row, cols) {
      const parts = [];
      if (cols.endereco && row[cols.endereco]) parts.push(row[cols.endereco]);
      if (cols.numero && row[cols.numero]) parts.push(row[cols.numero]);
      if (cols.bairro && row[cols.bairro]) parts.push(row[cols.bairro]);
      if (cols.cidade && row[cols.cidade]) parts.push(row[cols.cidade]);
      if (cols.uf && row[cols.uf]) parts.push(row[cols.uf]);
      return parts.join(', ');
    }

    function loadCSV() {
      Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          const cols = detectColumns(results.meta.fields || Object.keys(results.data[0] || {}));
          allInstitutions = results.data.map((row, index) => {
            const nome = row[cols.nome] || `Instituição ${index + 1}`;
            const endereco = buildAddress(row, cols);
            const cep = formatCEP(row[cols.cep] || '');
            const horario = row[cols.horario] || '';
            const programaText = row[cols.programa] || '';
            const programs = parsePrograms(programaText);
            let lat = parseFloat(row[cols.lat]);
            let lng = parseFloat(row[cols.lng]);
            const fullAddress = `${endereco}, ${cep}, Brasil`.replace(/^,\s*/, '').replace(/,\s*,/g, ',');
            return {
              id: index, nome, endereco, cep, horario, programaText, programs, fullAddress,
              lat: isNaN(lat) ? null : lat, lng: isNaN(lng) ? null : lng,
              hasCoords: !isNaN(lat) && !isNaN(lng)
            };
          });
          document.getElementById('loading').style.display = 'none';
          createFilterButtons();
          render();
          geocodeMissingCoordinates();
        },
        error: function(err) {
          console.error(err);
          document.getElementById('loading').innerHTML = '<p class="text-danger fw-bold">Erro ao carregar dados. Verifique a conexão.</p>';
        }
      });
    }

    function createFilterButtons() {
      const container = document.getElementById('filterButtons');
      const programs = ['Todos', ...Object.keys(PROGRAM_COLORS)];
      container.innerHTML = programs.map(p => {
        const color = p === 'Todos' ? '#6c757d' : PROGRAM_COLORS[p];
        const active = p === currentFilter;
        return `<button class="btn btn-sm filter-btn ${active ? 'active' : ''}" 
          style="background-color: ${active ? color : 'white'}; color: ${active ? 'white' : color}; border-color: ${color};"
          onclick="setFilter('${p}')">${p}</button>`;
      }).join('');
    }

    function setFilter(filter) {
      currentFilter = filter;
      createFilterButtons();
      render();
    }

    function handleSearch() {
      currentSearch = document.getElementById('searchInput').value.trim();
      render();
    }

    async function buscarLocalizacao() {
      const input = document.getElementById('cepInput');
      const cep = input.value.replace(/\D/g, '');

      if (cep.length !== 8) {
        alert('CEP inválido. Digite 8 dígitos.');
        return;
      }

      try {
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await res.json();
        if (data.erro) { alert('CEP não encontrado.'); return; }

        const enderecoCompleto = `${data.logradouro}, ${data.bairro}, ${data.localidade} - ${data.uf}, Brasil`;

        let coords = await nominatimGeocode(enderecoCompleto);
        if (!coords) coords = await nominatimGeocode(`${data.logradouro}, ${data.localidade}, DF, Brasil`);
        if (!coords) coords = await nominatimGeocode(`${data.bairro}, ${data.localidade}, DF, Brasil`);

        if (!coords) { alert('Não foi possível geocodificar o endereço.'); return; }

        referencePoint = { lat: coords.lat, lng: coords.lng, endereco: enderecoCompleto };
        addReferenceMarker(coords.lat, coords.lng, enderecoCompleto);

        input.value = '';
        currentSearch = '';
        document.getElementById('searchInput').value = '';
        currentFilter = 'Todos';
        createFilterButtons();
        render();
      } catch (e) {
        console.error(e);
        alert('Erro ao buscar localização. Tente novamente.');
      }
    }

    function addReferenceMarker(lat, lng, address) {
      if (referenceMarker) map.removeLayer(referenceMarker);
      if (radiusCircle) map.removeLayer(radiusCircle);
      referenceMarker = L.marker([lat, lng], { icon: createMarkerIcon('#dc3545') }).addTo(map);
      referenceMarker.bindPopup(`<strong><i class="fa-solid fa-location-dot me-1"></i>Local de referência</strong><br>${escapeHtml(address)}`).openPopup();
      radiusCircle = L.circle([lat, lng], { color: '#dc3545', fillColor: '#dc3545', fillOpacity: 0.08, radius: currentRadius * 1000 }).addTo(map);
      map.setView([lat, lng], 13);
    }

    function useGPS() {
      if (!navigator.geolocation) { alert('Geolocalização não suportada pelo navegador.'); return; }
      navigator.geolocation.getCurrentPosition(
        pos => {
          referencePoint = { lat: pos.coords.latitude, lng: pos.coords.longitude, endereco: 'Sua localização atual (GPS)' };
          addReferenceMarker(pos.coords.latitude, pos.coords.longitude, referencePoint.endereco);
          currentFilter = 'Todos';
          createFilterButtons();
          render();
        },
        err => { alert('Erro ao obter localização: ' + err.message); }
      );
    }

    function limpar() {
      currentSearch = '';
      currentFilter = 'Todos';
      currentRadius = 100;
      referencePoint = null;
      document.getElementById('searchInput').value = '';
      document.getElementById('cepInput').value = '';
      document.getElementById('radiusSlider').value = 100;
      document.getElementById('radiusValue').textContent = '100 km';
      if (referenceMarker) { map.removeLayer(referenceMarker); referenceMarker = null; }
      if (radiusCircle) { map.removeLayer(radiusCircle); radiusCircle = null; }
      createFilterButtons();
      render();
    }

    function render() {
      let filtered = allInstitutions.filter(inst => {
        const search = currentSearch.toLowerCase();
        const matchesText = !search ||
          inst.nome.toLowerCase().includes(search) ||
          inst.endereco.toLowerCase().includes(search) ||
          inst.programs.some(p => p.toLowerCase().includes(search));
        const matchesFilter = currentFilter === 'Todos' || inst.programs.includes(currentFilter);
        return matchesText && matchesFilter;
      });

      if (referencePoint) {
        filtered.forEach(inst => {
          inst.distancia = inst.hasCoords ? haversine(referencePoint.lat, referencePoint.lng, inst.lat, inst.lng) : Infinity;
        });
        filtered.sort((a, b) => a.distancia - b.distancia);
        filtered = filtered.filter(inst => inst.distancia <= currentRadius);
      } else {
        filtered.forEach(inst => inst.distancia = null);
      }

      renderCards(filtered);
      renderMarkers(filtered);
    }

    function renderCards(institutions) {
      const container = document.getElementById('resultsContainer');
      if (!institutions.length) {
        container.innerHTML = '<div class="alert alert-info">Nenhuma instituição encontrada.</div>';
        return;
      }
      container.innerHTML = institutions.map(inst => `
        <div class="card mb-3 shadow-sm">
          <div class="card-body">
            <h6 class="card-title fw-bold">${escapeHtml(inst.nome)}</h6>
            <p class="card-text mb-1"><i class="fa-solid fa-location-dot text-secondary me-2"></i>${escapeHtml(inst.endereco) || '-'}</p>
            <p class="card-text mb-1"><i class="fa-solid fa-envelope text-secondary me-2"></i>${inst.cep || '-'}</p>
            <p class="card-text mb-2"><i class="fa-solid fa-clock text-secondary me-2"></i>${escapeHtml(inst.horario) || '-'}</p>
            <div class="mb-2">
              ${inst.programs.map(p => `<span class="badge" style="background-color: ${PROGRAM_COLORS[p] || PROGRAM_COLORS['Outros']};">${escapeHtml(p)}</span>`).join(' ')}
            </div>
            ${inst.distancia !== null ? `<p class="card-text mb-0"><small class="text-muted"><i class="fa-solid fa-route me-1"></i>${inst.distancia.toFixed(1)} km</small></p>` : ''}
          </div>
        </div>
      `).join('');
    }

    function renderMarkers(institutions) {
      markersLayer.clearLayers();
      institutions.forEach(inst => {
        if (inst.hasCoords) {
          const marker = L.marker([inst.lat, inst.lng], { icon: createMarkerIcon(PROGRAM_COLORS[inst.programs[0]] || PROGRAM_COLORS['Outros']) });
          marker.bindPopup(`
            <div style="min-width: 220px;">
              <h6 class="mb-1 fw-bold">${escapeHtml(inst.nome)}</h6>
              <p class="mb-1 small">${escapeHtml(inst.endereco) || '-'}</p>
              <p class="mb-1 small"><strong>CEP:</strong> ${inst.cep || '-'}</p>
              <p class="mb-1 small"><strong>Horário:</strong> ${escapeHtml(inst.horario) || '-'}</p>
              <div class="mb-1">
                ${inst.programs.map(p => `<span class="badge" style="background-color: ${PROGRAM_COLORS[p] || PROGRAM_COLORS['Outros']};">${escapeHtml(p)}</span>`).join(' ')}
              </div>
              ${inst.distancia !== null ? `<p class="mb-0 small"><strong><i class="fa-solid fa-route me-1"></i></strong>${inst.distancia.toFixed(1)} km</p>` : ''}
            </div>
          `);
          markersLayer.addLayer(marker);
        }
      });
      if (radiusCircle) markersLayer.addLayer(radiusCircle);
      if (referenceMarker) markersLayer.addLayer(referenceMarker);
    }

    document.getElementById('cepInput').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 8) v = v.slice(0, 8);
      if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
      e.target.value = v;
    });

    document.getElementById('searchInput').addEventListener('input', function(e) {
      currentSearch = e.target.value.trim();
      render();
    });

    document.getElementById('radiusSlider').addEventListener('input', function(e) {
      currentRadius = parseInt(e.target.value);
      document.getElementById('radiusValue').textContent = currentRadius + ' km';
      if (radiusCircle && referencePoint) {
        radiusCircle.setRadius(currentRadius * 1000);
      }
      render();
    });

    window.addEventListener('DOMContentLoaded', () => {
      initMap();
      loadCSV();
    });
  </script>
</body>
</html>
