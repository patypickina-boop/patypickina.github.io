<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localizador de Parceiros Sema MPDFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  html, body { height: 100%; background: #f4f6f9; color: #222; }

  .app { display: flex; height: 100vh; width: 100%; }

  /* SIDEBAR */
  .sidebar {
    width: 380px;
    min-width: 380px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #e3e6ee;
    height: 100%;
  }
  .sidebar-header {
    background: #0b3d91;
    color: #fff;
    padding: 18px 20px;
  }
  .sidebar-header h1 { font-size: 18px; font-weight: 700; line-height: 1.2; }
  .sidebar-header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .filters {
    padding: 14px 16px 8px;
    border-bottom: 1px solid #eef0f5;
  }
  .filter-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-btn {
    border: 1px solid #d6dae6;
    background: #fff;
    color: #334;
    padding: 6px 10px;
    border-radius: 16px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .filter-btn:hover { border-color: #0b3d91; color: #0b3d91; }
  .filter-btn.active { background: #0b3d91; color: #fff; border-color: #0b3d91; }

  .search-block { padding: 12px 16px; border-bottom: 1px solid #eef0f5; }
  .search-group {
    display: flex;
    align-items: center;
    border: 1px solid #d6dae6;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
  }
  .search-group .icon { padding: 0 10px; color: #8a93a6; font-size: 14px; }
  .search-group input {
    flex: 1;
    border: none;
    outline: none;
    padding: 10px 4px;
    font-size: 13px;
    background: transparent;
  }
  .gps-btn {
    border: none;
    background: #eef2fb;
    color: #0b3d91;
    padding: 10px 12px;
    cursor: pointer;
    font-size: 15px;
  }
  .gps-btn:hover { background: #dde6f7; }

  .action-btn {
    width: 100%;
    margin-top: 10px;
    background: #0b3d91;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .action-btn:hover { background: #093377; }
  .action-btn:disabled { background: #8a93a6; cursor: not-allowed; }

  .extra-filters { padding: 10px 16px; border-bottom: 1px solid #eef0f5; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .extra-filters label { cursor: pointer; display: flex; align-items: center; gap: 6px; color: #334; }

  .status { padding: 8px 16px; font-size: 12px; color: #6a7385; min-height: 20px; }

  .results { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .card {
    background: #fff;
    border: 1px solid #e6e9f2;
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .card-title { font-weight: 700; font-size: 14px; color: #1a2233; margin-bottom: 4px; }
  .card-address { font-size: 12px; color: #7a8294; margin-bottom: 6px; }
  .card-distance { font-size: 13px; color: #0b3d91; font-weight: 700; margin-bottom: 8px; }
  .card-badges { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge {
    background: #eef2fb;
    color: #0b3d91;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge.weekend { background: #fff3e6; color: #b5651d; }
  .card-hours { font-size: 11px; color: #6a7385; margin-top: 6px; }

  /* MAP */
  .map-wrap { flex: 1; height: 100%; position: relative; }
  #map { width: 100%; height: 100%; }

  .empty { text-align: center; color: #8a93a6; font-size: 13px; padding: 30px 10px; }

  @media (max-width: 768px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; min-width: 0; height: 55vh; }
    .map-wrap { height: 45vh; }
  }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Localizador de Parceiros Sema MPDFT</h1>
      <p>Encontre instituições parceiras no Distrito Federal</p>
    </div>

    <div class="filters">
      <div class="filter-buttons" id="filterButtons">
        <button class="filter-btn active" data-filter="Todos">Todos</button>
        <button class="filter-btn" data-filter="Prestação de Serviços">Prestação de Serviços</button>
        <button class="filter-btn" data-filter="Prestação Pecuniária">Prestação Pecuniária</button>
        <button class="filter-btn" data-filter="Programa de Saúde">Programa de Saúde</button>
        <button class="filter-btn" data-filter="Palestras">Palestras</button>
      </div>
    </div>

    <div class="search-block">
      <div class="search-group">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Digite CEP ou endereço...">
        <button class="gps-btn" id="gpsBtn" title="Usar minha localização">🎯</button>
      </div>
      <button class="action-btn" id="searchBtn">Buscar por CEP/Endereço</button>
    </div>

    <div class="extra-filters">
      <label><input type="checkbox" id="weekendFilter"> Final de Semana</label>
    </div>

    <div class="status" id="status">Carregando instituições...</div>

    <div class="results" id="results"></div>
  </aside>

  <div class="map-wrap">
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=';
const GEOCACHE_KEY = 'sema_mpdft_geocache_v1';

let allInstitutions = [];
let currentFilter = 'Todos';
let weekendOnly = false;
let referencePoint = null; // {lat, lon, label}
let map = null;
let markersLayer = null;
let refMarker = null;

/* ---------- Init ---------- */
function init() {
  map = L.map('map').setView([-15.7939, -47.8828], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);

  document.getElementById('filterButtons').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });

  document.getElementById('weekendFilter').addEventListener('change', e => {
    weekendOnly = e.target.checked;
    render();
  });

  document.getElementById('searchBtn').addEventListener('click', searchByAddress);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchByAddress();
  });
  document.getElementById('gpsBtn').addEventListener('click', useGeolocation);

  loadInstitutions();
}

/* ---------- Data loading ---------- */
async function loadInstitutions() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('Planilha vazia');
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const col = name => headers.findIndex(h => h === name.toLowerCase() || h.includes(name.toLowerCase()));

    const idx = {
      nome: col('nome') >= 0 ? col('nome') : col('instituicao') >= 0 ? col('instituicao') : col('razao'),
      endereco: col('endereco') >= 0 ? col('endereco') : col('logradouro'),
      categoria: col('categoria') >= 0 ? col('categoria') : col('programa') >= 0 ? col('programa') : col('tipo'),
      horario: col('horario') >= 0 ? col('horario') : col('funcionamento'),
      weekend: col('final de semana') >= 0 ? col('final de semana') : col('fim de semana') >= 0 ? col('fim de semana') : col('fds'),
      lat: col('latitude') >= 0 ? col('latitude') : col('lat'),
      lon: col('longitude') >= 0 ? col('longitude') : col('lon') >= 0 ? col('lon') : col('lng'),
      prestServ: col('prestacao de servicos') >= 0 ? col('prestacao de servicos') : col('prestação de serviços'),
      prestPec: col('prestacao pecuniaria') >= 0 ? col('prestacao pecuniaria') : col('prestação pecuniária'),
      progSaude: col('programa de saude') >= 0 ? col('programa de saude') : col('programa de saúde'),
      palestras: col('palestras') >= 0 ? col('palestras') : col('palestra')
    };

    allInstitutions = rows.slice(1).filter(r => r.length > 1).map((r, i) => {
      const get = k => idx[k] >= 0 ? (r[idx[k]] || '').trim() : '';
      const nome = get('nome') || `Instituição ${i+1}`;
      const endereco = get('endereco');
      const categoria = get('categoria');
      const horario = get('horario');
      const weekend = get('weekend');
      let lat = parseFloat(get('lat'));
      let lon = parseFloat(get('lon'));
      if (isNaN(lat)) lat = null;
      if (isNaN(lon)) lon = null;

      const programs = [];
      if (get('prestServ') && /sim|x|✓|true/i.test(get('prestServ'))) programs.push('Prestação de Serviços');
      if (get('prestPec') && /sim|x|✓|true/i.test(get('prestPec'))) programs.push('Prestação Pecuniária');
      if (get('progSaude') && /sim|x|✓|true/i.test(get('progSaude'))) programs.push('Programa de Saúde');
      if (get('palestras') && /sim|x|✓|true/i.test(get('palestras'))) programs.push('Palestras');
      if (programs.length === 0 && categoria) programs.push(categoria);

      return {
        id: i,
        nome, endereco, categoria, horario, weekend,
        lat, lon, programs,
        distance: null
      };
    });

    document.getElementById('status').textContent = `${allInstitutions.length} instituições carregadas.`;
    await geocodeMissing();
    render();
  } catch (err) {
    console.error(err);
    document.getElementById('status').textContent = 'Erro ao carregar planilha.';
    document.getElementById('results').innerHTML = '<div class="empty">Não foi possível carregar os dados.</div>';
  }
}

/* ---------- CSV parser ---------- */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/* ---------- Geocoding with cache ---------- */
function getGeoCache() {
  try { return JSON.parse(localStorage.getItem(GEOCACHE_KEY) || '{}'); }
  catch { return {}; }
}
function setGeoCache(cache) { localStorage.setItem(GEOCACHE_KEY, JSON.stringify(cache)); }

async function geocodeAddress(address) {
  const cache = getGeoCache();
  const key = address.trim().toLowerCase();
  if (cache[key]) return cache[key];
  try {
    const q = encodeURIComponent(address + ', Distrito Federal, Brasil');
    const res = await fetch(NOMINATIM_URL + q, { headers: { 'Accept-Language': 'pt-BR' } });
    const data = await res.json();
    if (data && data.length > 0) {
      const coords = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
      cache[key] = coords;
      setGeoCache(cache);
      return coords;
    }
  } catch (e) { console.warn('Geocode fail', address, e); }
  cache[key] = null;
  setGeoCache(cache);
  return null;
}

async function geocodeMissing() {
  const needGeo = allInstitutions.filter(i => (i.lat === null || i.lon === null) && i.endereco);
  if (needGeo.length === 0) return;
  document.getElementById('status').textContent = `Geocodificando ${needGeo.length} endereços...`;
  for (const inst of needGeo) {
    const coords = await geocodeAddress(inst.endereco);
    if (coords) { inst.lat = coords.lat; inst.lon = coords.lon; }
    await new Promise(r => setTimeout(r, 1100)); // respeitar rate limit do Nominatim
  }
  document.getElementById('status').textContent = `${allInstitutions.length} instituições carregadas.`;
}

/* ---------- Search by address ---------- */
async function searchByAddress() {
  const val = document.getElementById('searchInput').value.trim();
  if (!val) { document.getElementById('status').textContent = 'Digite um CEP ou endereço.'; return; }
  document.getElementById('status').textContent = 'Buscando endereço...';
  document.getElementById('searchBtn').disabled = true;
  try {
    const q = encodeURIComponent(val + ', Distrito Federal, Brasil');
    const res = await fetch(NOMINATIM_URL + q, { headers: { 'Accept-Language': 'pt-BR' } });
    const data = await res.json();
    if (data && data.length > 0) {
      referencePoint = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), label: data[0].display_name };
      document.getElementById('status').textContent = 'Referência definida. Lista ordenada por distância.';
      computeDistances();
      render();
      map.setView([referencePoint.lat, referencePoint.lon], 13);
    } else {
      document.getElementById('status').textContent = 'Endereço não encontrado no DF.';
    }
  } catch (e) {
    document.getElementById('status').textContent = 'Erro na busca do endereço.';
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

function useGeolocation() {
  if (!navigator.geolocation) { document.getElementById('status').textContent = 'Geolocalização indisponível.'; return; }
  document.getElementById('status').textContent = 'Obtendo sua localização...';
  navigator.geolocation.getCurrentPosition(pos => {
    referencePoint = { lat: pos.coords.latitude, lon: pos.coords.longitude, label: 'Minha localização' };
    document.getElementById('status').textContent = 'Referência definida. Lista ordenada por distância.';
    computeDistances();
    render();
    map.setView([referencePoint.lat, referencePoint.lon], 13);
  }, () => {
    document.getElementById('status').textContent = 'Não foi possível obter sua localização.';
  });
}

/* ---------- Distance ---------- */
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function computeDistances() {
  if (!referencePoint) return;
  allInstitutions.forEach(i => {
    if (i.lat !== null && i.lon !== null) {
      i.distance = haversine(referencePoint.lat, referencePoint.lon, i.lat, i.lon);
    } else {
      i.distance = null;
    }
  });
}

/* ---------- Filtering & rendering ---------- */
function isWeekendInstitution(inst) {
  const w = (inst.weekend || '').toLowerCase();
  const h = (inst.horario || '').toLowerCase();
  if (/sim|sábado|sabado|domingo|x|✓/.test(w)) return true;
  if (/sábado|sabado|domingo/.test(h)) return true;
  return false;
}

function getFiltered() {
  let list = allInstitutions.slice();

  if (currentFilter !== 'Todos') {
    list = list.filter(i =>
      i.programs.includes(currentFilter) ||
      (i.categoria || '').toLowerCase().includes(currentFilter.toLowerCase())
    );
  }

  if (weekendOnly) {
    list = list.filter(isWeekendInstitution);
  }

  if (referencePoint) {
    list = list.filter(i => i.distance !== null);
    list.sort((a, b) => a.distance - b.distance);
  }

  return list;
}

function render() {
  const list = getFiltered();
  const container = document.getElementById('results');
  markersLayer.clearLayers();

  if (list.length === 0) {
    container.innerHTML = '<div class="empty">Nenhuma instituição encontrada com os filtros atuais.</div>';
    return;
  }

  container.innerHTML = list.map(i => {
    const dist = i.distance !== null
      ? `<div class="card-distance">📍 ${i.distance.toFixed(1).replace('.', ',')} km</div>`
      : '';
    const badges = i.programs.map(p => `<span class="badge">${p}</span>`).join('');
    const weekendBadge = isWeekendInstitution(i) ? '<span class="badge weekend">Final de Semana</span>' : '';
    const hours = i.horario ? `<div class="card-hours">🕒 ${i.horario}</div>` : '';
    return `<div class="card">
      <div class="card-title">${escapeHtml(i.nome)}</div>
      ${i.endereco ? `<div class="card-address">${escapeHtml(i.endereco)}</div>` : ''}
      ${dist}
      <div class="card-badges">${badges}${weekendBadge}</div>
      ${hours}
    </div>`;
  }).join('');

  // markers
  list.forEach(i => {
    if (i.lat !== null && i.lon !== null) {
      const m = L.marker([i.lat, i.lon]).bindPopup(`<strong>${escapeHtml(i.nome)}</strong><br>${escapeHtml(i.endereco || '')}`);
      markersLayer.addLayer(m);
    }
  });

  if (referencePoint && refMarker) { map.removeLayer(refMarker); refMarker = null; }
  if (referencePoint) {
    refMarker = L.marker([referencePoint.lat, referencePoint.lon], {
      icon: L.divIcon({ className: 'ref-icon', html: '📍', iconSize: [24,24], iconAnchor: [12,24] })
    }).addTo(map).bindPopup('Ponto de referência');
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

init();
</script>
</body>
</html>
