<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador Parceiros Sema MPDFT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        header { background: white; color: black; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #eee; }
        header img { height: 50px; }
        #main { display: flex; height: calc(100vh - 82px); }
        #sidebar { width: 350px; padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; background: white; }
        #map { flex: 1; }
        .search-box { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        .card { padding: 15px; border: 1px solid #eee; margin-bottom: 10px; border-radius: 8px; }
        .card h3 { font-size: 16px; margin-bottom: 5px; }
        .btn-map { background: #004a8e; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .error-msg { color: red; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="MPDFT">
        <h1>Localizador Parceiros Sema MPDFT</h1>
    </header>
    <div id="main">
        <aside id="sidebar">
            <input type="text" id="search" class="search-box" placeholder="Busque por qualquer palavra (ex: Ceilândia)...">
            <div id="results">Carregando dados...</div>
        </aside>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
        let partners = [];
        const map = L.map('map').setView([-15.7942, -47.8822], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markers = L.layerGroup().addTo(map);

        async function load() {
            try {
                const res = await fetch(URL);
                const text = await res.text();
                const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
                partners = json.table.rows.map(r => ({
                    nome: r.c[0]?.v || '',
                    endereco: r.c[1]?.v || '',
                    programa: r.c[4]?.v || '',
                    lat: null, lng: null
                })).filter(p => p.nome);
                render();
            } catch (e) {
                document.getElementById('results').innerHTML = '<p class="error-msg">Erro ao carregar. Verifique se a planilha está "Publicada na Web" e com acesso para "Qualquer pessoa".</p>';
            }
        }

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const container = document.getElementById('results');
            container.innerHTML = '';
            markers.clearLayers();

            partners.filter(p => JSON.stringify(p).toLowerCase().includes(query)).forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${p.nome}</h3><p>${p.endereco}</p><p><b>${p.programa}</b></p><button class="btn-map">Ver no Mapa</button>`;
                container.appendChild(card);
                // Aqui o app tentaria geocodificar o endereço para colocar o pino
            });
        }

        document.getElementById('search').addEventListener('input', render);
        load();
    </script>
</body>
</html>
