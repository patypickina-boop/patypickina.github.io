<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localizador de Parceiros Sema</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #f4f6f8; color: #111; }

  /* Header */
  header {
    background: #ffffff;
    color: #111;
    border-bottom: 2px solid #e0e0e0;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    z-index: 1000;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.2px; }
  header .subtitle { font-size: 12px; color: #555; margin-top: 2px; }
  header .badge { background: #1b5e20; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; }

  /* Layout */
  #app { display: flex; height: calc(100% - 64px); }

  /* Sidebar */
  #sidebar {
    width: 360px;
    min-width: 360px;
    background: #ffffff;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar .filters {
    padding: 16px;
    overflow-y: auto;
    border-bottom: 1px solid #eee;
  }
  .filter-group { margin-bottom: 18px; }
  .filter-group label.title {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #222;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  input[type="text"], select, textarea {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 13px;
    background: #fff;
    color: #111;
  }
  input[type="text"]:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1b5e20;
    box-shadow: 0 0 0 2px rgba(27,94,32,0.15);
  }
  .checkbox-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .checkbox-row label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    background: #f5f5f5;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #eee;
  }
  .checkbox-row input { cursor: pointer; }

  .program-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
  .program-buttons button {
    border: 1px solid #ccc;
    background: #fff;
    color: #222;
    padding: 6px 10px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .program-buttons button:hover { border-color: #1b5e20; }
  .program-buttons button.active {
    background: #1b5e20;
    color: #fff;
    border-color: #1b5e20;
  }

  .ref-row { display: flex; gap: 6px; }
  .ref-row button {
    padding: 9px 12px;
    background: #1b5e20;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .ref-row button.gps { background: #0d47a1; }
  .ref-row button:hover { opacity: 0.9; }
  .ref-info { font-size: 11px; color: #666; margin-top: 6px; }

  .clear-btn {
    width: 100%;
    padding: 9px;
    background: #eee;
    color: #333;
    border: 1px solid #ccc;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-top: 4px;
  }
  .clear-btn:hover { background: #ddd; }

  /* Results */
  #results {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .result-count { font-size: 12px; color: #555; margin-bottom: 10px; font-weight: 600; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
  }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); transform: translateY(-1px); }
  .card.active { border-color: #1b5e20; box-shadow: 0 0 0 2px rgba(27,94,32,0.3); }
  .card h3 { font-size: 14px; color: #1b5e20; margin-bottom: 4px; }
  .card .meta { font-size: 12px; color: #444; margin-bottom: 3px; }
  .card .meta b { color: #111; }
  .card .distance {
    display: inline-block;
    background: #e8f5e9;
    color: #1b5e20;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
    margin-top: 6px;
  }
  .card .program-tag {
    display: inline-block;
    background: #e3f2fd;
    color: #0d47a1;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    margin-right: 4px;
  }
  .card .obs { font-size: 11px; color: #666; margin-top: 6px; font-style: italic; }

  /* Map */
  #map { flex: 1; height: 100%; min-height: 400px; }

  /* Status / loading */
  #status {
    position: fixed;
    bottom: 16px;
    left: 376px;
    background: #fff;
    border: 1px solid #ccc;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    color: #333;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    z-index: 999;
    display: none;
  }

  .loading-overlay {
    position: fixed;
    top: 64px; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    font-size: 16px;
    color: #1b5e20;
    font-weight: 600;
  }

  @media (max-width: 768px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; max-height: 45vh; }
    #map { height: 55vh; }
    #status { left: 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Localizador de Parceiros Sema</h1>
    <div class="subtitle">Ministério Público do Distrito Federal e Territórios - Sema</div>
  </div>
  <div class="badge">MPDFT</div>
</header>

<div id="app">
  <aside id="sidebar">
    <div class="filters">

      <div class="filter-group">
        <label class="title">Busca Global</label>
        <input type="text" id="globalSearch" placeholder="Pesquisar em todos os campos..." />
      </div>

      <div class="filter-group">
        <label class="title">Cidade Satélite</label>
        <input type="text" id="cityFilter" placeholder="Ex: Taguatinga, Ceilândia..." list="cityList" />
        <datalist id="cityList"></datalist>
      </div>

      <div class="filter-group">
        <label class="title">Dias de Funcionamento</label>
        <div class="checkbox-row">
          <label><input type="checkbox" class="day-filter" value="segunda"> Segunda</label>
          <label><input type="checkbox" class="day-filter" value="terça"> Terça</label>
          <label><input type="checkbox" class="day-filter" value="quarta"> Quarta</label>
          <label><input type="checkbox" class="day-filter" value="quinta"> Quinta</label>
          <label><input type="checkbox" class="day-filter" value="sexta"> Sexta</label>
          <label><input type="checkbox" class="day-filter" value="sábado"> Sábado</label>
          <label><input type="checkbox" class="day-filter" value="domingo"> Domingo</label>
        </div>
        <div class="checkbox-row" style="margin-top:8px;">
          <label><input type="checkbox" id="weekendFilter"> Final de Semana</label>
          <label><input type="checkbox" id="nightFilter"> Período Noturno (após 18h)</label>
        </div>
      </div>

      <div class="filter-group">
        <label class="title">Programas</label>
        <div class="program-buttons" id="programButtons">
          <button class="active" data-program="Todos">Todos</button>
          <button data-program="Prestação de Serviços">Prestação de Serviços</button>
          <button data-program="Prestação Pecuniária">Prestação Pecuniária</button>
          <button data-program="Programa de Saúde">Programa de Saúde</button>
          <button data-program="Palestras">Palestras</button>
        </div>
      </div>

      <div class="filter-group">
        <label class="title">Ponto de Referência (Ordenar por proximidade)</label>
        <div class="ref-row">
          <input type="text" id="referencePoint" placeholder="CEP, endereço ou local..." style="flex:1;" />
          <button id="useGps" class="gps" title="Usar minha localização">GPS</button>
          <button id="setReference">Definir</button>
        </div>
        <div class="ref-info" id="refInfo">Sem ponto de referência definido.</div>
      </div>

      <div class="filter-group">
        <button class="clear-btn" id="clearFilters">Limpar Filtros</button>
      </div>

    </div>

    <div id="results">
      <div class="result-count" id="resultCount">Carregando dados...</div>
      <div id="cardsContainer"></div>
    </div>
  </aside>

  <main id="map"></main>
</div>

<div id="status"></div>
<div class="loading-overlay" id="loadingOverlay">Carregando parceiros...</div>

<script>
const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';
const CACHE_KEY = 'sema_mpdft_geocode_cache';
const REF_KEY = 'sema_mpdft_reference';

let allPartners = [];
let filteredPartners = [];
let map, markersLayer;
let referencePoint = null; // {lat, lng, label}
let activeProgram = 'Todos';
let activeCard = null;

/* ---------- Init ---------- */
window.addEventListener('DOMContentLoaded', init);

async function init() {
  initMap();
  bindEvents();
  loadReferenceFromStorage();
  try {
    const rows = await fetchSheet();
    allPartners = await processRows(rows);
    populateCityList(allPartners);
    applyFilters();
  } catch (err) {
    console.error(err);
    showStatus('Erro ao carregar dados: ' + err.message, true);
    document.getElementById('resultCount').textContent = 'Erro ao carregar dados.';
  } finally {
    document.getElementById('loadingOverlay').style.display = 'none';
  }
}

/* ---------- Map ---------- */
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([-15.7939, -47.8828], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

/* ---------- Events ---------- */
function bindEvents() {
  document.getElementById('globalSearch').addEventListener('input', debounce(applyFilters, 250));
  document.getElementById('cityFilter').addEventListener('input', debounce(applyFilters, 250));
  document.getElementById('weekendFilter').addEventListener('change', applyFilters);
  document.getElementById('nightFilter').addEventListener('change', applyFilters);
  document.querySelectorAll('.day-filter').forEach(el => el.addEventListener('change', applyFilters));

  document.querySelectorAll('#programButtons button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#programButtons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeProgram = btn.dataset.program;
      applyFilters();
    });
  });

  document.getElementById('setReference').addEventListener('click', setReferenceFromInput);
  document.getElementById('referencePoint').addEventListener('keydown', e => {
    if (e.key === 'Enter') setReferenceFromInput();
  });
  document.getElementById('useGps').addEventListener('click', setReferenceFromGPS);
  document.getElementById('clearFilters').addEventListener('click', clearAllFilters);
}

/* ---------- Data Fetch ---------- */
async function fetchSheet() {
  const res = await fetch(SHEET_URL);
  if (!res.ok) throw new Error('Falha ao acessar a planilha (HTTP ' + res.status + ')');
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i+1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && next === '\n') i++;
        row.push(field); rows.push(row); row = []; field = '';
      } else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  if (rows.length === 0) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (r[idx] || '').trim());
    return obj;
  });
}

/* ---------- Process Rows ---------- */
async function processRows(rows) {
  const partners = [];
  for (const r of rows) {
    if (!r['Nome Completo'] && !r['Endereço']) continue;
    const p = {
      nome: r['Nome Completo'] || '',
      endereco: r['Endereço'] || '',
      horario: r['Horário de Funcionamento'] || '',
      programa: r['Programa'] || '',
      finalSemana: r['Final de Semana'] || '',
      noturno: r['Período Noturno (após 18h)'] || '',
      observacoes: r['Observações'] || '',
      cidade: extractCity(r['Endereço'] || ''),
      lat: null, lng: null
    };

    // Tenta usar coordenadas da planilha, validando
    const lat = parseFloat(r['Latitude'] || r['Lat'] || '');
    const lng = parseFloat(r['Longitude'] || r['Lng'] || r['Long'] || '');
    if (isValidCoord(lat, lng)) {
      p.lat = lat; p.lng = lng;
    } else if (p.endereco) {
      const geo = await geocodeAddress(p.endereco);
      if (geo) { p.lat = geo.lat; p.lng = geo.lng; }
    }
    partners.push(p);
  }
  return partners;
}

function isValidCoord(lat, lng) {
  return Number.isFinite(lat) && Number.isFinite(lng) &&
         Math.abs(lat) <= 90 && Math.abs(lng) <= 180 &&
         !(lat === 0 && lng === 0);
}

function extractCity(endereco) {
  if (!endereco) return '';
  // Heurística: cidades satélites comuns do DF
  const cidades = ['Taguatinga','Ceilândia','Samambaia','Águas Claras','Gama','Guará','Sobradinho','Planaltina','Santa Maria','Recanto das Emas','Riacho Fundo','Riacho Fundo II','Varjão','Brazlândia','Candangolândia','Núcleo Bandeirante','Park Way','São Sebastião','Sobradinho II','Itapoã','Jardim Botânico','Lago Sul','Lago Norte','Sudoeste','Octogonal','Asa Norte','Asa Sul','Plano Piloto'];
  const lower = endereco.toLowerCase();
  for (const c of cidades) {
    if (lower.includes(c.toLowerCase())) return c;
  }
  return '';
}

/* ---------- Geocoding (Nominatim + cache) ---------- */
function getCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function setCache(cache) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch {}
}

async function geocodeAddress(address) {
  const cache = getCache();
  const key = address.trim().toLowerCase();
  if (cache[key]) return cache[key];

  const q = address + ', Distrito Federal, Brasil';
  try {
    const url = `${NOMINATIM_URL}?format=json&limit=1&q=${encodeURIComponent(q)}`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
    if (!res.ok) return null;
    const data = await res.json();
    if (data && data.length > 0) {
      const geo = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      cache[key] = geo;
      setCache(cache);
      return geo;
    }
  } catch (err) {
    console.warn('Geocodificação falhou para:', address, err);
  }
  return null;
}

/* ---------- Reference Point ---------- */
function loadReferenceFromStorage() {
  try {
    const ref = JSON.parse(localStorage.getItem(REF_KEY) || 'null');
    if (ref && ref.lat && ref.lng) {
      referencePoint = ref;
      document.getElementById('referencePoint').value = ref.label || '';
      updateRefInfo();
    }
  } catch {}
}

async function setReferenceFromInput() {
  const q = document.getElementById('referencePoint').value.trim();
  if (!q) { referencePoint = null; localStorage.removeItem(REF_KEY); updateRefInfo(); applyFilters(); return; }
  showStatus('Localizando ponto de referência...');
  const geo = await geocodeAddress(q);
  if (geo) {
    referencePoint = { lat: geo.lat, lng: geo.lng, label: q };
    localStorage.setItem(REF_KEY, JSON.stringify(referencePoint));
    updateRefInfo();
    applyFilters();
    showStatus('Ponto de referência definido.');
  } else {
    showStatus('Não foi possível localizar o ponto de referência.', true);
  }
  setTimeout(hideStatus, 2500);
}

function setReferenceFromGPS() {
  if (!navigator.geolocation) { showStatus('Geolocalização não suportada.', true); return; }
  showStatus('Obtendo sua localização...');
  navigator.geolocation.getCurrentPosition(pos => {
    referencePoint = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'Minha localização (GPS)' };
    localStorage.setItem(REF_KEY, JSON.stringify(referencePoint));
    document.getElementById('referencePoint').value = referencePoint.label;
    updateRefInfo();
    applyFilters();
    showStatus('Localização GPS definida.');
    setTimeout(hideStatus, 2000);
  }, err => {
    showStatus('Erro ao obter GPS: ' + err.message, true);
    setTimeout(hideStatus, 3000);
  }, { enableHighAccuracy: true, timeout: 10000 });
}

function updateRefInfo() {
  const el = document.getElementById('refInfo');
  if (referencePoint) {
    el.textContent = `Referência: ${referencePoint.label} (${referencePoint.lat.toFixed(5)}, ${referencePoint.lng.toFixed(5)})`;
    el.style.color = '#1b5e20';
  } else {
    el.textContent = 'Sem ponto de referência definido.';
    el.style.color = '#666';
  }
}

/* ---------- Filters ---------- */
function applyFilters() {
  const global = document.getElementById('globalSearch').value.toLowerCase().trim();
  const city = document.getElementById('cityFilter').value.toLowerCase().trim();
  const days = Array.from(document.querySelectorAll('.day-filter:checked')).map(el => el.value);
  const weekend = document.getElementById('weekendFilter').checked;
  const night = document.getElementById('nightFilter').checked;

  filteredPartners = allPartners.filter(p => {
    // Busca global em todos os campos
    if (global) {
      const blob = [p.nome, p.endereco, p.horario, p.programa, p.finalSemana, p.noturno, p.observacoes, p.cidade]
        .join(' ').toLowerCase();
      if (!blob.includes(global)) return false;
    }
    // Cidade
    if (city) {
      if (!p.cidade.toLowerCase().includes(city) && !p.endereco.toLowerCase().includes(city)) return false;
    }
    // Programa
    if (activeProgram !== 'Todos') {
      if (!p.programa.toLowerCase().includes(activeProgram.toLowerCase())) return false;
    }
    // Dias
    if (days.length) {
      const horarioLower = (p.horario + ' ' + p.endereco).toLowerCase();
      if (!days.some(d => horarioLower.includes(d))) return false;
    }
    // Final de semana
    if (weekend) {
      const ws = (p.finalSemana + ' ' + p.horario).toLowerCase();
      if (!(ws.includes('sim') || ws.includes('sábado') || ws.includes('domingo') || ws.includes('fds'))) return false;
    }
    // Noturno
    if (night) {
      const ns = (p.noturno + ' ' + p.horario).toLowerCase();
      if (!(ns.includes('sim') || ns.includes('noturno') || ns.includes('18') || ns.includes('19') || ns.includes('20') || ns.includes('21'))) return false;
    }
    return true;
  });

  // Ordenação por proximidade
  if (referencePoint) {
    filteredPartners.forEach(p => {
      p._distance = (p.lat != null && p.lng != null)
        ? haversine(referencePoint.lat, referencePoint.lng, p.lat, p.lng)
        : Infinity;
    });
    filteredPartners.sort((a, b) => (a._distance || Infinity) - (b._distance || Infinity));
  } else {
    filteredPartners.forEach(p => p._distance = null);
  }

  renderResults();
  renderMarkers();
}

function clearAllFilters() {
  document.getElementById('globalSearch').value = '';
  document.getElementById('cityFilter').value = '';
  document.querySelectorAll('.day-filter').forEach(el => el.checked = false);
  document.getElementById('weekendFilter').checked = false;
  document.getElementById('nightFilter').checked = false;
  document.querySelectorAll('#programButtons button').forEach(b => b.classList.remove('active'));
  document.querySelector('#programButtons button[data-program="Todos"]').classList.add('active');
  activeProgram = 'Todos';
  referencePoint = null;
  localStorage.removeItem(REF_KEY);
  document.getElementById('referencePoint').value = '';
  updateRefInfo();
  applyFilters();
}

/* ---------- Render ---------- */
function renderResults() {
  const container = document.getElementById('cardsContainer');
  const countEl = document.getElementById('resultCount');
  countEl.textContent = `${filteredPartners.length} parceiro(s) encontrado(s)` +
    (referencePoint ? ' - ordenado por proximidade' : '');

  container.innerHTML = '';
  filteredPartners.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = idx;

    let html = `<h3>${escapeHtml(p.nome || 'Sem nome')}</h3>`;
    if (p.programa) html += `<div class="meta"><span class="program-tag">${escapeHtml(p.programa)}</span></div>`;
    if (p.endereco) html += `<div class="meta"><b>Endereço:</b> ${escapeHtml(p.endereco)}</div>`;
    if (p.horario) html += `<div class="meta"><b>Horário:</b> ${escapeHtml(p.horario)}</div>`;
    if (p.finalSemana) html += `<div class="meta"><b>Final de Semana:</b> ${escapeHtml(p.finalSemana)}</div>`;
    if (p.noturno) html += `<div class="meta"><b>Período Noturno:</b> ${escapeHtml(p.noturno)}</div>`;
    if (p.observacoes) html += `<div class="obs">${escapeHtml(p.observacoes)}</div>`;
    if (referencePoint && p._distance != null && p._distance !== Infinity) {
      html += `<div class="distance">${p._distance.toFixed(2)} km de distância</div>`;
    } else if (referencePoint && (p.lat == null || p.lng == null)) {
      html += `<div class="distance" style="background:#ffebee;color:#c62828;">Sem coordenadas</div>`;
    }

    card.innerHTML = html;
    card.addEventListener('click', () => focusPartner(idx));
    container.appendChild(card);
  });
}

function renderMarkers() {
  markersLayer.clearLayers();
  const bounds = [];
  filteredPartners.forEach((p, idx) => {
    if (p.lat == null || p.lng == null) return;
    const marker = L.marker([p.lat, p.lng]).addTo(markersLayer);
    let popup = `<strong>${escapeHtml(p.nome)}</strong><br>` +
      `${escapeHtml(p.endereco)}<br>` +
      `<em>${escapeHtml(p.programa)}</em>`;
    if (referencePoint && p._distance != null && p._distance !== Infinity) {
      popup += `<br><b>${p._distance.toFixed(2)} km</b>`;
    }
    marker.bindPopup(popup);
    marker.on('click', () => focusPartner(idx, false));
    bounds.push([p.lat, p.lng]);
  });

  if (referencePoint) {
    const refIcon = L.divIcon({ className: 'ref-icon', html: '📍', iconSize: [24,24], iconAnchor: [12,12] });
    const rm = L.marker([referencePoint.lat, referencePoint.lng], { icon: refIcon }).addTo(markersLayer);
    rm.bindPopup('Ponto de Referência<br>' + escapeHtml(referencePoint.label));
    bounds.push([referencePoint.lat, referencePoint.lng]);
  }

  if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [40,40], maxZoom: 14 });
  } else if (bounds.length === 1) {
    map.setView(bounds[0], 14);
  }
}

function focusPartner(idx, panMap = true) {
  const p = filteredPartners[idx];
  if (!p) return;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.card[data-idx="${idx}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  if (panMap && p.lat != null && p.lng != null) {
    map.setView([p.lat, p.lng], 15, { animate: true });
  }
}

/* ---------- Helpers ---------- */
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function populateCityList(partners) {
  const cities = [...new Set(partners.map(p => p.cidade).filter(Boolean))].sort();
  const list = document.getElementById('cityList');
  list.innerHTML = cities.map(c => `<option value="${escapeHtml(c)}">`).join('');
}

function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.borderColor = isError ? '#c62828' : '#ccc';
  el.style.color = isError ? '#c62828' : '#333';
}
function hideStatus() {
  document.getElementById('status').style.display = 'none';
}
</script>
