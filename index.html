<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Parceiros Sema MPDFT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --cor-servicos: #0d6efd;
            --cor-pecuniaria: #198754;
            --cor-saude: #dc3545;
            --cor-palestras: #6f42c1;
            --cor-azul-escuro: #003366;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-app {
            background: var(--cor-azul-escuro);
            color: white;
            padding: 0.75rem 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            z-index: 1100;
            position: relative;
        }
        .header-app h1 { font-size: 1.25rem; margin: 0; font-weight: 700; }
        .header-app p { font-size: 0.9rem; margin: 0; opacity: 0.9; }
        .main-container { display: flex; height: calc(100% - 70px); }
        .sidebar {
            width: 420px;
            min-width: 320px;
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
        .filtros-area { padding: 1rem; border-bottom: 1px solid #dee2e6; background: white; }
        .btn-filtro { font-size: 0.78rem; padding: 0.35rem 0.6rem; border-radius: 20px; margin-bottom: 0.35rem; border: 1px solid #dee2e6; background: white; color: #495057; transition: all 0.2s; }
        .btn-filtro:hover, .btn-filtro.active { color: white; border-color: transparent; }
        .btn-filtro.todos.active { background: #6c757d; }
        .btn-filtro.servicos.active { background: var(--cor-servicos); }
        .btn-filtro.pecuniaria.active { background: var(--cor-pecuniaria); }
        .btn-filtro.saude.active { background: var(--cor-saude); }
        .btn-filtro.palestras.active { background: var(--cor-palestras); }
        .busca-area { padding: 1rem; background: white; border-bottom: 1px solid #dee2e6; }
        .raio-area { padding: 0.75rem 1rem; background: #f1f3f5; border-bottom: 1px solid #dee2e6; }
        .lista-cards { flex: 1; overflow-y: auto; padding: 0.75rem; }
        .card-parceiro { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 1px solid #dee2e6; border-radius: 0.75rem; margin-bottom: 0.75rem; background: white; }
        .card-parceiro:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
        .card-body { padding: 1rem; }
        .badge-programa { font-size: 0.7rem; padding: 0.35em 0.55em; border-radius: 0.5rem; margin-right: 0.3rem; margin-bottom: 0.3rem; display: inline-block; color: white; }
        .badge-servicos { background: var(--cor-servicos); }
        .badge-pecuniaria { background: var(--cor-pecuniaria); }
        .badge-saude { background: var(--cor-saude); }
        .badge-palestras { background: var(--cor-palestras); }
        .distancia-badge { font-size: 0.85rem; color: #6c757d; margin-top: 0.5rem; }
        .distancia-badge.proxima { color: #198754; font-weight: 700; }
        #map { flex: 1; min-height: 400px; position: relative; }
        .debug-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(255,255,255,0.95);
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.75rem;
            color: #495057;
            z-index: 1000;
            max-width: 280px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .debug-panel.hidden { display: none; }
        .spinner-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .leaflet-popup-content { font-size: 0.9rem; margin: 12px; }
        .leaflet-popup-content h6 { margin-bottom: 0.5rem; font-weight: 700; }
        .leaflet-popup-content p { margin-bottom: 0.3rem; }
        .marker-circle {
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 11px;
        }
        .ponto-referencia { background: #dc3545 !important; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 4px rgba(220,53,69,0.3); }
        @media (max-width: 768px) {
            .main-container { flex-direction: column; height: calc(100% - 70px); }
            .sidebar { width: 100%; height: 55%; border-right: none; border-bottom: 1px solid #dee2e6; }
            #map { height: 45%; }
        }
        .toast-container { z-index: 3000; }
    </style>
</head>
<body>

<<header class="header-app">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="fa-solid fa-handshake me-2"></i>Localizador de Parceiros Sema MPDFT</h1>
            <p>Encontre instituições parceiras</p>
        </div>
        <button class="btn btn-sm btn-outline-light" id="btnDebugToggle" title="Painel de diagnóstico">
            <i class="fa-solid fa-bug"></i>
        </button>
    </div>
</header>

<div class="main-container">
    <aside class="sidebar">
        <div class="filtros-area">
            <label class="form-label fw-bold small">Filtrar por programa</label>
            <div class="d-flex flex-wrap gap-1">
                <button class="btn btn-filtro todos active" data-filtro="todos">Todos</button>
                <button class="btn btn-filtro servicos" data-filtro="Prestação de Serviços">Prestação de Serviços</button>
                <button class="btn btn-filtro pecuniaria" data-filtro="Prestação Pecuniária">Prestação Pecuniária</button>
                <button class="btn btn-filtro saude" data-filtro="Programa de Saúde">Programa de Saúde</button>
                <button class="btn btn-filtro palestras" data-filtro="Palestras">Palestras</button>
            </div>
        </div>

        <div class="busca-area">
            <label class="form-label fw-bold small">Buscar</label>
            <div class="input-group mb-2">
                <input type="text" class="form-control" id="inputBusca" placeholder="Nome, endereço, cidade ou CEP">
                <button class="btn btn-primary" id="btnBuscarTexto" title="Buscar"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button class="btn btn-success" id="btnBuscarLocalizacao" title="Buscar localização"><i class="fa-solid fa-location-dot"></i></button>
                <button class="btn btn-info text-white" id="btnGPS" title="Usar minha localização"><i class="fa-solid fa-satellite"></i></button>
                <button class="btn btn-warning text-dark" id="btnLimpar" title="Limpar"><i class="fa-solid fa-broom"></i></button>
            </div>
            <div class="d-flex gap-2 mt-2">
                <button class="btn btn-sm btn-outline-secondary" id="btnGPS2"><i class="fa-solid fa-location-crosshairs me-1"></i>📍 Buscar Localização</button>
            </div>
        </div>

        <div class="raio-area">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label fw-bold small mb-0">Raio de busca</label>
                <span class="badge bg-secondary" id="labelRaio">100 km</span>
            </div>
            <input type="range" class="form-range" id="rangeRaio" min="1" max="100" value="100" step="1">
        </div>

        <div class="lista-cards" id="listaCards">
            <div class="text-center text-muted py-5">
                <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Carregando...</span></div>
                <p class="mt-2">Carregando parceiros...</p>
            </div>
        </div>
    </aside>

    <main id="map">
        <div class="debug-panel hidden" id="debugPanel">
            <div class="fw-bold mb-1">Diagnóstico</div>
            <div>Programa ativo: <span id="dbgPrograma">todos</span></div>
            <div>Raio: <span id="dbgRaio">100 km</span></div>
            <div>Ponto de referência: <span id="dbgReferencia">não</span></div>
            <div>Total carregadas: <span id="dbgTotal">0</span></div>
            <div>Total filtradas: <span id="dbgFiltradas">0</span></div>
            <div class="mt-1 text-muted small">Lat: <span id="dbgLat">-</span>, Lng: <span id="dbgLng">-</span></div>
        </div>
    </main>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="toastApp" class="toast align-items-center text-white bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toastBody">Mensagem</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<div class="spinner-overlay" id="spinnerGlobal">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
    <p class="mt-3 text-muted fw-bold" id="spinnerTexto">Carregando dados...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
(function() {
    'use strict';

    const CONFIG = {
        csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4piiHPoYzoa6AMbnp3cev6lMx_QTFibh79hifYTXNE0F2a_1I4v7yl7a7xkOCGlAh4k52Jl7pHk4o/pub?output=csv',
        raioPadrao: 100,
        cores: {
            'Prestação de Serviços': '#0d6efd',
            'Prestação Pecuniária': '#198754',
            'Programa de Saúde': '#dc3545',
            'Palestras': '#6f42c1'
        }
    };

    const sinogramas = {
        'Prestação de Serviços': ['servico', 'serviço', 'servicos', 'serviços', 'bens', 'prestação de bens', 'prestacao de bens', 'prestacao de servicos', 'prestação de serviços'],
        'Prestação Pecuniária': ['pecuni', 'pecuniaria', 'pecuniária', 'pecuniario', 'pecuniário', 'dinheiro', 'financeiro', 'financeira', 'multa', 'valor', 'valores'],
        'Programa de Saúde': ['saude', 'saúde', 'medico', 'médico', 'medica', 'médica', 'hospital', 'clinica', 'clínica', 'vacina', 'vacinacao', 'vacinação', 'posto', 'ubs', 'sus'],
        'Palestras': ['palestra', 'palestras', 'educacao', 'educação', 'capacitacao', 'capacitação', 'treinamento', 'treinamentos', 'curso', 'cursos', 'workshop', 'seminario', 'seminário', 'workshops', 'seminarios', 'seminários']
    };

    let mapa;
    let camadaMarcadores = L.layerGroup();
    let marcadorReferencia = null;
    let pontoReferencia = null;
    let todasInstituicoes = [];
    let instituicoesFiltradas = [];
    let filtroAtivo = 'todos';
    let raioKm = CONFIG.raioPadrao;
    let toastEl = document.getElementById('toastApp');
    let toast = bootstrap.Toast.getOrCreateInstance(toastEl);

    document.addEventListener('DOMContentLoaded', iniciar);

    function iniciar() {
        inicializarMapa();
        configurarEventos();
        carregarDados();
    }

    function inicializarMapa() {
        mapa = L.map('map').setView([-15.7975, -47.8919], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(mapa);
        camadaMarcadores.addTo(mapa);
    }

    function configurarEventos() {
        document.querySelectorAll('.btn-filtro').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroAtivo = btn.dataset.filtro;
                atualizarInterface();
            });
        });

        document.getElementById('btnBuscarTexto').addEventListener('click', buscarTexto);
        document.getElementById('btnBuscarLocalizacao').addEventListener('click', buscarLocalizacao);
        document.getElementById('btnGPS').addEventListener('click', buscarGPS);
        document.getElementById('btnGPS2').addEventListener('click', buscarLocalizacao);
        document.getElementById('btnLimpar').addEventListener('click', limparTudo);

        document.getElementById('inputBusca').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') buscarTexto();
        });

        document.getElementById('rangeRaio').addEventListener('input', (e) => {
            raioKm = parseInt(e.target.value, 10);
            document.getElementById('labelRaio').textContent = raioKm + ' km';
            if (pontoReferencia) atualizarInterface();
        });

        document.getElementById('btnDebugToggle').addEventListener('click', () => {
            document.getElementById('debugPanel').classList.toggle('hidden');
        });
    }

    function carregarDados() {
        mostrarSpinner('Carregando dados da planilha...');
        Papa.parse(CONFIG.csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            encoding: 'UTF-8',
            complete: function(resultados) {
                ocultarSpinner();
                if (!resultados.data || resultados.data.length === 0) {
                    mostrarErro('Nenhum dado encontrado na planilha.');
                    return;
                }
                todasInstituicoes = normalizarDados(resultados.data);
                atualizarInterface();
            },
            error: function(err) {
                ocultarSpinner();
                console.error(err);
                mostrarErro('Erro ao carregar CSV. Verifique o link da planilha.');
            }
        });
    }

    function normalizarDados(linhas) {
        const mapeamento = encontrarColunas(linhas[0]);
        return linhas.map((linha, idx) => {
            const nome = limpar(linha[mapeamento.nome]);
            const endereco = limpar(linha[mapeamento.endereco]);
            const cidade = limpar(linha[mapeamento.cidade]);
            const cep = limpar(linha[mapeamento.cep]);
            const horario = limpar(linha[mapeamento.horario]);
            const programaTexto = limpar(linha[mapeamento.programa]);
            const lat = parseFloat(linha[mapeamento.latitude]);
            const lng = parseFloat(linha[mapeamento.longitude]);
            const programas = parseProgramas(programaTexto);
            return {
                id: idx,
                nome,
                endereco,
                cidade,
                cep: formatarCEP(cep),
                horario,
                programaTexto,
                programas,
                lat: isNaN(lat) ? null : lat,
                lng: isNaN(lng) ? null : lng,
                distancia: null
            };
        }).filter(item => item.nome && item.lat && item.lng);
    }

    function encontrarColunas(cabecalho) {
        const colunas = Object.keys(cabecalho || {});
        const buscar = (nomes) => {
            for (let nome of nomes) {
                const achado = colunas.find(c => c.toLowerCase().trim().includes(nome.toLowerCase()));
                if (achado) return achado;
            }
            return colunas.find(c => c.toLowerCase().includes(nome)) || '';
        };
        return {
            nome: buscar(['Nome Completo', 'Nome', 'Razão Social', 'Razao Social']),
            endereco: buscar(['Endereço', 'Endereco', 'Logradouro']),
            cidade: buscar(['Cidade', 'Município', 'Municipio']),
            cep: buscar(['CEP', 'Cep']),
            horario: buscar(['Horário', 'Horario', 'Funcionamento']),
            programa: buscar(['Programa', 'Programas', 'Tipo']),
            latitude: buscar(['Latitude', 'Lat']),
            longitude: buscar(['Longitude', 'Lng', 'Long'])
        };
    }

    function limpar(valor) {
        return String(valor || '').trim();
    }

    function formatarCEP(cep) {
        const numeros = String(cep).replace(/\D/g, '');
        if (numeros.length === 8) return numeros.replace(/(\d{5})(\d{3})/, '$1-$2');
        return cep;
    }

    function parseProgramas(texto) {
        const encontrados = new Set();
        const normalizado = texto.toLowerCase();
        for (let [tipo, sinonimos] of Object.entries(sinogramas)) {
            for (let sinonimo of sinonimos) {
                if (normalizado.includes(sinonimo)) {
                    encontrados.add(tipo);
                    break;
                }
            }
        }
        return Array.from(encontrados).length ? Array.from(encontrados) : ['Prestação de Serviços'];
    }

    function obterClassePrograma(programa) {
        const mapa = {
            'Prestação de Serviços': 'servicos',
            'Prestação Pecuniária': 'pecuniaria',
            'Programa de Saúde': 'saude',
            'Palestras': 'palestras'
        };
        return mapa[programa] || 'servicos';
    }

    function badgeProgramaHTML(programa) {
        const classe = obterClassePrograma(programa);
        return `<span class="badge-programa badge-${classe}">${programa}</span>`;
    }

    function obterCorPrograma(programa) {
        return CONFIG.cores[programa] || '#6c757d';
    }

    function calcularDistancia(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function formatarDistancia(km) {
        if (km === null || km === undefined || isNaN(km)) return '';
        if (km < 1) return `${Math.round(km * 1000)} m`;
        return `${km.toFixed(1)} km`;
    }

    function buscarTexto() {
        const texto = document.getElementById('inputBusca').value.trim().toLowerCase();
        if (!texto) {
            atualizarInterface();
            return;
        }
        instituicoesFiltradas = todasInstituicoes.filter(item => {
            return item.nome.toLowerCase().includes(texto) ||
                   item.endereco.toLowerCase().includes(texto) ||
                   item.cidade.toLowerCase().includes(texto) ||
                   item.cep.toLowerCase().includes(texto) ||
                   item.horario.toLowerCase().includes(texto) ||
                   item.programaTexto.toLowerCase().includes(texto);
        });
        if (pontoReferencia) {
            instituicoesFiltradas = instituicoesFiltradas.map(item => ({
                ...item,
                distancia: calcularDistancia(pontoReferencia.lat, pontoReferencia.lng, item.lat, item.lng)
            })).sort((a, b) => (a.distancia || 9999) - (b.distancia || 9999));
        }
        renderizarLista(instituicoesFiltradas);
        renderizarMapa(instituicoesFiltradas);
        atualizarDebug();
    }

    async function buscarLocalizacao() {
        let texto = document.getElementById('inputBusca').value.trim();
        if (!texto) {
            mostrarErro('Digite um CEP, endereço ou nome de lugar para buscar localização.');
            return;
        }
        mostrarSpinner('Buscando localização...');
        try {
            let termo = texto;
            let endereco = texto;
            if (/^\d{8}$/.test(texto.replace(/\D/g, ''))) {
                const cep = texto.replace(/\D/g, '');
                const viaCep = await fetch(`https://viacep.com.br/ws/${cep}/json/`).then(r => r.json());
                if (!viaCep.erro) {
                    endereco = `${viaCep.logradouro}, ${viaCep.localidade}, ${viaCep.uf}, Brasil`;
                    termo = endereco;
                } else {
                    endereco = `${cep}, Brasil`;
                }
            }
            if (!/Brasil|Brazil|Distrito Federal|DF/i.test(endereco)) {
                endereco += ', Distrito Federal, Brasil';
            }
            const coords = await geocodificarNominatim(endereco);
            if (!coords) throw new Error('Localização não encontrada');
            definirPontoReferencia(coords.lat, coords.lng, termo);
            document.getElementById('inputBusca').value = '';
            filtroAtivo = 'todos';
            document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
            document.querySelector('.btn-filtro.todos').classList.add('active');
            atualizarInterface();
            ocultarSpinner();
        } catch (err) {
            console.error(err);
            ocultarSpinner();
            mostrarErro('Não foi possível encontrar a localização. Tente outro termo.');
        }
    }

    function buscarGPS() {
        if (!navigator.geolocation) {
            mostrarErro('Geolocalização não suportada pelo navegador.');
            return;
        }
        mostrarSpinner('Obtendo localização via GPS...');
        navigator.geolocation.getCurrentPosition(
            pos => {
                definirPontoReferencia(pos.coords.latitude, pos.coords.longitude, 'Sua localização');
                document.getElementById('inputBusca').value = '';
                filtroAtivo = 'todos';
                document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
                document.querySelector('.btn-filtro.todos').classList.add('active');
                atualizarInterface();
                ocultarSpinner();
            },
            err => {
                ocultarSpinner();
                console.error(err);
                mostrarErro('Erro ao obter localização GPS. Verifique as permissões.');
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    async function geocodificarNominatim(endereco) {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&limit=1`;
        const resposta = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        const dados = await resposta.json();
        if (dados && dados.length > 0) {
            return { lat: parseFloat(dados[0].lat), lng: parseFloat(dados[0].lon) };
        }
        return null;
    }

    function definirPontoReferencia(lat, lng, label) {
        pontoReferencia = { lat, lng, label };
        if (marcadorReferencia) camadaMarcadores.removeLayer(marcadorReferencia);
        const icone = L.divIcon({
            className: 'ponto-referencia',
            iconSize: [18, 18],
            iconAnchor: [9, 9],
            popupAnchor: [0, -10]
        });
        marcadorReferencia = L.marker([lat, lng], { icon: icone, zIndexOffset: 1000 })
            .addTo(camadaMarcadores)
            .bindPopup(`<<strong>📍 Ponto de referência</strong><br>${label}`);
        mapa.setView([lat, lng], 13);
    }

    function limparTudo() {
        pontoReferencia = null;
        if (marcadorReferencia) {
            camadaMarcadores.removeLayer(marcadorReferencia);
            marcadorReferencia = null;
        }
        document.getElementById('inputBusca').value = '';
        filtroAtivo = 'todos';
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        document.querySelector('.btn-filtro.todos').classList.add('active');
        raioKm = CONFIG.raioPadrao;
        document.getElementById('rangeRaio').value = raioKm;
        document.getElementById('labelRaio').textContent = raioKm + ' km';
        atualizarInterface();
    }

    function atualizarInterface() {
        let lista = [...todasInstituicoes];
        if (filtroAtivo !== 'todos') {
            lista = lista.filter(item => item.programas.includes(filtroAtivo));
        }
        if (pontoReferencia) {
            lista = lista.map(item => ({
                ...item,
                distancia: calcularDistancia(pontoReferencia.lat, pontoReferencia.lng, item.lat, item.lng)
            }));
            lista = lista.filter(item => !item.distancia || item.distancia <= raioKm);
            lista.sort((a, b) => (a.distancia || 9999) - (b.distancia || 9999));
        }
        instituicoesFiltradas = lista;
        renderizarLista(lista);
        renderizarMapa(lista);
        atualizarDebug();
    }

    function renderizarLista(lista) {
        const container = document.getElementById('listaCards');
        if (lista.length === 0) {
            container.innerHTML = `<div class="text-center text-muted py-5"><i class="fa-regular fa-face-frown fa-2x"></i><p class="mt-2">Nenhuma instituição encontrada.</p></div>`;
            return;
        }
        container.innerHTML = lista.map(item => {
            const badges = item.programas.map(p => badgeProgramaHTML(p)).join('');
            const distanciaHTML = item.distancia !== null && item.distancia !== undefined
                ? `<div class="distancia-badge ${item.distancia < 5 ? 'proxima' : ''}"><i class="fa-solid fa-location-dot me-1"></i>${formatarDistancia(item.distancia)}</div>`
                : '';
            return `
                <div class="card card-parceiro" data-id="${item.id}">
                    <div class="card-body">
                        <h6 class="card-title fw-bold mb-1">${item.nome}</h6>
                        <p class="small text-muted mb-1"><i class="fa-solid fa-map-marker-alt me-1"></i>${item.endereco}${item.cidade ? ' - ' + item.cidade : ''}</p>
                        <p class="small text-muted mb-1"><i class="fa-solid fa-mail-bulk me-1"></i>CEP ${item.cep}</p>
                        <p class="small text-muted mb-2"><i class="fa-regular fa-clock me-1"></i>${item.horario || 'Horário não informado'}</p>
                        <div>${badges}</div>
                        ${distanciaHTML}
                    </div>
                </div>
            `;
        }).join('');

        container.querySelectorAll('.card-parceiro').forEach(card => {
            card.addEventListener('click', () => {
                const id = parseInt(card.dataset.id, 10);
                const item = todasInstituicoes.find(i => i.id === id);
                if (item) centralizarInstituicao(item);
            });
        });
    }

    function centralizarInstituicao(item) {
        mapa.setView([item.lat, item.lng], 16);
        camadaMarcadores.eachLayer(layer => {
            if (layer.itemId === item.id && layer.openPopup) {
                layer.openPopup();
            }
        });
    }

    function renderizarMapa(lista) {
        camadaMarcadores.clearLayers();
        if (pontoReferencia && marcadorReferencia) {
            const icone = L.divIcon({
                className: 'ponto-referencia',
                iconSize: [18, 18],
                iconAnchor: [9, 9],
                popupAnchor: [0, -10]
            });
            marcadorReferencia = L.marker([pontoReferencia.lat, pontoReferencia.lng], { icon: icone, zIndexOffset: 1000 })
                .addTo(camadaMarcadores)
                .bindPopup(`<<strong>📍 Ponto de referência</strong><br>${pontoReferencia.label}`);
        }
        lista.forEach(item => {
            const programaPrincipal = item.programas[0];
            const cor = obterCorPrograma(programaPrincipal);
            const icone = L.divIcon({
                className: 'marker-circle',
                html: `<div style="background:${cor};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);">${item.programas.length > 1 ? item.programas.length : ''}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14],
                popupAnchor: [0, -14]
            });
            const badges = item.programas.map(p => badgeProgramaHTML(p)).join('');
            const distancia = item.distancia !== null && item.distancia !== undefined ? `<div><strong>📍 Distância:</strong> ${formatarDistancia(item.distancia)}</div>` : '';
            const popup = `
                <div>
                    <h6>${item.nome}</h6>
                    <p><i class="fa-solid fa-map-marker-alt me-1"></i>${item.endereco}${item.cidade ? '<br>' + item.cidade : ''}</p>
                    <p><i class="fa-solid fa-mail-bulk me-1"></i>CEP ${item.cep}</p>
                    <p><i class="fa-regular fa-clock me-1"></i>${item.horario || 'Horário não informado'}</p>
                    <div>${badges}</div>
                    ${distancia}
                </div>
            `;
            const marcador = L.marker([item.lat, item.lng], { icon: icone }).bindPopup(popup);
            marcador.itemId = item.id;
            camadaMarcadores.addLayer(marcador);
        });
    }

    function atualizarDebug() {
        document.getElementById('dbgPrograma').textContent = filtroAtivo;
        document.getElementById('dbgRaio').textContent = raioKm + ' km';
        document.getElementById('dbgReferencia').textContent = pontoReferencia ? 'sim' : 'não';
        document.getElementById('dbgTotal').textContent = todasInstituicoes.length;
        document.getElementById('dbgFiltradas').textContent = instituicoesFiltradas.length;
        document.getElementById('dbgLat').textContent = pontoReferencia ? pontoReferencia.lat.toFixed(6) : '-';
        document.getElementById('dbgLng').textContent = pontoReferencia ? pontoReferencia.lng.toFixed(6) : '-';
    }

    function mostrarSpinner(texto) {
        document.getElementById('spinnerTexto').textContent = texto;
        document.getElementById('spinnerGlobal').style.display = 'flex';
    }

    function ocultarSpinner() {
        document.getElementById('spinnerGlobal').style.display = 'none';
    }

    function mostrarErro(mensagem) {
        document.getElementById('toastBody').textContent = mensagem;
        toast.show();
    }
})();
</script>

</body>
</html>
