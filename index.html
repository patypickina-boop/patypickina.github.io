<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Localizador SEMA - MPDFT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #002147; --accent: #e91e63; --bg: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 15px; z-index: 1000; }
        main { flex: 1; display: flex; overflow: hidden; position: relative; }
        #sidebar { width: 380px; background: white; display: flex; flex-direction: column; box-shadow: 2px 0 15px rgba(0,0,0,0.1); z-index: 900; transition: 0.3s; }
        .filter-container { padding: 15px; border-bottom: 1px solid #eee; }
        .search-wrapper { position: relative; margin-bottom: 10px; }
        .search-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #2196f3; }
        .search-wrapper input { width: 100%; padding: 10px 12px 10px 35px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        .btn-gps { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        .category-pills { display: flex; flex-wrap: wrap; gap: 5px; }
        .pill { padding: 5px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; cursor: pointer; color: white; opacity: 0.6; }
        .pill.active { opacity: 1; transform: scale(1.05); }
        .p-all { background: #2196f3; } .p-serv { background: #4caf50; } .p-pec { background: #ff9800; } .p-sau { background: #f44336; } .p-pal { background: #9c27b0; }
        #results-list { flex: 1; overflow-y: auto; padding: 10px; background: #f9f9f9; }
        .card { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid var(--primary); cursor: pointer; }
        .card h3 { font-size: 0.9rem; color: var(--primary); margin-bottom: 5px; }
        .card p { font-size: 0.8rem; color: #666; }
        .card .dist { color: var(--accent); font-weight: bold; font-size: 0.75rem; margin-top: 5px; }
        #map { flex: 1; z-index: 1; }
        .mobile-nav { display: none; background: white; border-top: 1px solid #ddd; height: 60px; }
        .nav-btn { flex: 1; border: none; background: none; color: #777; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .nav-btn.active { color: var(--primary); border-top: 3px solid var(--primary); }
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; height: 100%; transform: translateX(-100%); }
            #sidebar.active { transform: translateX(0); }
            .mobile-nav { display: flex; }
        }
        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="loader"><div class="spinner"></div><p style="margin-top:15px; font-weight:bold; color:var(--primary)">Carregando...</p></div>
<header><i class="fas fa-hands-helping fa-lg"></i><h1>Localizador de Parceiros SEMA</h1></header>
<main>
    <aside id="sidebar">
        <div class="filter-container">
            <div class="search-wrapper"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Busque por qualquer palavra..."></div>
            <button class="btn-gps" onclick="getLocation()"><i class="fas fa-crosshairs"></i> USAR MEU GPS</button>
            <div class="category-pills">
                <div class="pill p-all active" onclick="filterCat('Todos', this)">Todos</div>
                <div class="pill p-serv" onclick="filterCat('Prestação de serviços', this)">Serviços</div>
                <div class="pill p-pec" onclick="filterCat('Prestação  pecuniária', this)">Pecuniária</div>
                <div class="pill p-sau" onclick="filterCat('Programa de saúde', this)">Saúde</div>
                <div class="pill p-pal" onclick="filterCat('Palestras', this)">Palestras</div>
            </div>
        </div>
        <div id="results-list"></div>
    </aside>
    <div id="map"></div>
</main>
<nav class="mobile-nav">
    <button class="nav-btn active" id="btn-map" onclick="toggleView('map')">Mapa</button>
    <button class="nav-btn" id="btn-list" onclick="toggleView('list')">Lista</button>
</nav>
<script>
    const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
    let map, markers = [], allData = [], currentCat = 'Todos', userPos = null;

    function init() {
        map = L.map('map').setView([-15.7942, -47.8822], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        loadData();
    }

    function loadData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: (results) => {
                allData = results.data.filter(r => r['Nome '] || r['Nome da Instituição']).map(item => {
                    let lat = parseFloat(String(item['Latitude']).replace(',', '.'));
                    let lng = parseFloat(String(item['Longitude']).replace(',', '.'));
                    return {
                        nome: item['Nome '] || item['Nome da Instituição'],
                        endereco: item['Endereço'],
                        programas: item['Programa'] || item['Programas'],
                        horario: item['Horário de Funcionamento'] || item['Horário de Funcionamento/Observações'],
                        lat: isNaN(lat) ? null : lat, lng: isNaN(lng) ? null : lng,
                        raw: JSON.stringify(item).toLowerCase()
                    };
                });
                render(allData);
                document.getElementById('loader').style.display = 'none';
            }
        });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function render(data) {
        const listDiv = document.getElementById('results-list');
        listDiv.innerHTML = '';
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        if (userPos) {
            data.sort((a, b) => {
                if(!a.lat || !b.lat) return 1;
                return calculateDistance(userPos[0], userPos[1], a.lat, a.lng) - calculateDistance(userPos[0], userPos[1], b.lat, b.lng);
            });
        }
        data.forEach(item => {
            const dist = userPos && item.lat ? calculateDistance(userPos[0], userPos[1], item.lat, item.lng).toFixed(1) + ' km' : '';
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h3>${item.nome}</h3><p>${item.endereco}</p>${dist ? `<div class="dist">${dist} de você</div>` : ''}`;
            card.onclick = () => { if(item.lat) { map.setView([item.lat, item.lng], 16); toggleView('map'); } };
            listDiv.appendChild(card);
            if(item.lat) {
                const m = L.marker([item.lat, item.lng]).bindPopup(`<b>${item.nome}</b>`).addTo(map);
                markers.push(m);
            }
        });
    }

    document.getElementById('search-input').oninput = applyFilters;
    function filterCat(cat, el) {
        currentCat = cat;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const search = document.getElementById('search-input').value.toLowerCase();
        const filtered = allData.filter(i => i.raw.includes(search) && (currentCat === 'Todos' || (i.programas && i.programas.toLowerCase().includes(currentCat.toLowerCase()))));
        render(filtered);
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                userPos = [p.coords.latitude, p.coords.longitude];
                map.setView(userPos, 13);
                L.marker(userPos, {icon: L.divIcon({className:'u', html:'<i class="fas fa-user-circle" style="color:#2196f3;font-size:24px;"></i>'})}).addTo(map);
                applyFilters();
            });
        }
    }

    function toggleView(v) {
        const s = document.getElementById('sidebar');
        if(v === 'list') s.classList.add('active');
        else s.classList.remove('active');
    }
    window.onload = init;
</script>
</body>
</html>
