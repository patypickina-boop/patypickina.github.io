<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localizador de Parceiros Sema MPDFT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  html, body { height: 100%; background: #f4f6f8; color: #222; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  header {
    background: #002147;
    color: #fff;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
    z-index: 1000;
  }
  header .icon {
    width: 44px; height: 44px;
    background: rgba(255,255,255,.12);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: .3px; }
  header p { font-size: 13px; opacity: .85; margin-top: 2px; }

  /* Layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 420px;
    min-width: 360px;
    max-width: 480px;
    background: #fff;
    border-right: 1px solid #e1e4e8;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 8px;
    background: #fafbfc;
  }
  .sidebar-header h2 { font-size: 16px; color: #002147; display: flex; align-items: center; gap: 8px; }
  .sidebar-header .funnel { font-size: 16px; }

  .filters { padding: 12px 16px; border-bottom: 1px solid #eee; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 600; }

  .search-row { display: flex; gap: 6px; }
  .search-row input {
    flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px;
  }
  .search-row input:focus { outline: none; border-color: #002147; box-shadow: 0 0 0 2px rgba(0,33,71,.15); }
  .btn {
    padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 6px; font-weight: 600;
  }
  .btn-primary { background: #002147; color: #fff; }
  .btn-primary:hover { background: #013a78; }
  .btn-pink { background: #e91e63; color: #fff; }
  .btn-pink:hover { background: #c1134e; }
  .btn-secondary { background: #eef1f4; color: #333; }
  .btn-secondary:hover { background: #dde2e8; }

  .btn-group { display: flex; gap: 6px; margin-top: 6px; }

  .slider-wrap { margin-top: 4px; }
  .slider-wrap .label-row { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 4px; }
  .slider-wrap input[type=range] { width: 100%; accent-color: #002147; }

  .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .pill {
    padding: 5px 11px; border-radius: 999px; font-size: 12px; cursor: pointer;
    border: 1px solid transparent; font-weight: 600; user-select: none;
  }
  .pill.active { box-shadow: 0 0 0 2px rgba(0,0,0,.1) inset; }
  .pill.todos { background: #6c757d; color: #fff; }
  .pill.servicos { background: #1e88e5; color: #fff; }
  .pill.pecuniaria { background: #2e7d32; color: #fff; }
  .pill.saude { background: #c62828; color: #fff; }
  .pill.palestras { background: #7b1fa2; color: #fff; }
  .pill.inactive { opacity: .55; }

  /* Results */
  .results { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .status-bar {
    padding: 8px 16px; font-size: 12px; color: #555; background: #fafbfc;
    border-top: 1px solid #eee; font-weight: 600;
  }
  .card {
    background: #fff; border: 1px solid #e6e8eb; border-radius: 8px;
    padding: 12px; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,.04);
  }
  .card h3 { font-size: 14px; color: #111; margin-bottom: 4px; }
  .card .addr { font-size: 12px; color: #555; margin-bottom: 2px; }
  .card .cep { font-size: 12px; color: #777; margin-bottom: 2px; }
  .card .horario { font-size: 12px; color: #444; margin-bottom: 6px; }
  .card .badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 999px; color: #fff; font-weight: 600;
  }
  .badge.servicos { background: #1e88e5; }
  .badge.pecuniaria { background: #2e7d32; }
  .badge.saude { background: #c62828; }
  .badge.palestras { background: #7b1fa2; }
  .badge.outros { background: #6c757d; }
  .card .link-map {
    font-size: 12px; color: #002147; text-decoration: none; font-weight: 600; cursor: pointer;
  }
  .card .link-map:hover { text-decoration: underline; }
  .card .dist { font-size: 11px; color: #888; margin-bottom: 6px; }

  .loading { text-align: center; padding: 20px; color: #777; font-size: 13px; }
  .empty { text-align: center; padding: 30px 10px; color: #999; font-size: 13px; }

  /* Map */
  #map { flex: 1; height: 100%; background: #ddd; }

  /* Responsive */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; max-width: 100%; min-width: 0; height: 55%; }
    #map { height: 45%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="icon">🤝</div>
    <div>
      <h1>Localizador de Parceiros Sema MPDFT</h1>
      <p>Encontre instituições parceiras</p>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2><span class="funnel">🔻</span> Filtros</h2>
      </div>

      <div class="filters">
        <div class="field">
          <label>Busca global</label>
          <div class="search-row">
            <input type="text" id="searchInput" placeholder="Buscar por nome, endereço, programa...">
            <button class="btn btn-primary" id="searchBtn">🔍</button>
          </div>
        </div>

        <div class="field">
          <label>Localização (CEP ou endereço)</label>
          <div class="search-row">
            <input type="text" id="locationInput" placeholder="72426-075" value="72426-075">
            <button class="btn btn-pink" id="locationBtn">📍 Buscar Localização</button>
          </div>
          <div class="btn-group">
            <button class="btn btn-secondary" id="gpsBtn">📡 GPS</button>
            <button class="btn btn-secondary" id="clearBtn">🖌️ Limpar</button>
          </div>
        </div>

        <div class="field slider-wrap">
          <div class="label-row">
            <span>Raio</span>
            <span id="radiusLabel">Sem limite</span>
          </div>
          <input type="range" id="radiusSlider" min="0" max="200" step="5" value="0">
        </div>

        <div class="field">
          <label>Categoria</label>
          <div class="pills" id="pills">
            <span class="pill todos active" data-cat="Todos">Todos</span>
            <span class="pill servicos inactive" data-cat="Prestação de Serviços">Prestação de Serviços</span>
            <span class="pill pecuniaria inactive" data-cat="Prestação Pecuniária">Prestação Pecuniária</span>
            <span class="pill saude inactive" data-cat="Programa de Saúde">Programa de Saúde</span>
            <span class="pill palestras inactive" data-cat="Palestras">Palestras</span>
          </div>
        </div>
      </div>

      <div class="results" id="results">
        <div class="loading">Carregando instituições...</div>
      </div>

      <div class="status-bar" id="statusBar">0 instituições encontradas</div>
    </aside>

    <div id="map"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw/export?format=csv&gid=0';
const CACHE_KEY = 'sema_mpdft_geocode_cache_v19';
const NOMINATIM_BASE = 'https://nominatim.openstreetmap.org/search';

let allInstitutions = [];
let filteredInstitutions = [];
let referencePoint = null; // {lat, lng}
let activeCategory = 'Todos';
let searchTerm = '';
let radiusKm = 0; // 0 = sem limite
let map = null;
let markersLayer = null;
let refMarker = null;

const categoryColors = {
  'Prestação de Serviços': 'servicos',
  'Prestação Pecuniária': 'pecuniaria',
  'Programa de Saúde': 'saude',
  'Palestras': 'palestras'
};

function normalize(s) {
  return (s || '').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function getCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); }
  catch (e) { return {}; }
}
function setCache(cache) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch (e) {}
}

function haversineKm(a, b) {
  if (!a || !b) return null;
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const la1 = a.lat * Math.PI / 180;
  const la2 = b.lat * Math.PI / 180;
  const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([-15.7939, -47.8828], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function blueIcon() {
  return L.divIcon({
    className: '',
    html: '<div style="width:18px;height:18px;background:#1e88e5;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.5);"></div>',
    iconSize: [18,18], iconAnchor: [9,9]
  });
}
function pinkIcon() {
  return L.divIcon({
    className: '',
    html: '<div style="width:20px;height:20px;background:#e91e63;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.5);"></div>',
    iconSize: [20,20], iconAnchor: [10,10]
  });
}

function clearMarkers() {
  if (markersLayer) markersLayer.clearLayers();
}

function renderMarkers() {
  clearMarkers();
  filteredInstitutions.forEach(inst => {
    if (inst._latlng) {
      const m = L.marker(inst._latlng, { icon: blueIcon() }).addTo(markersLayer);
      m.bindPopup('<strong>' + (inst.nome || 'Instituição') + '</strong><br>' + (inst.endereco || '') + '<br>' + (inst.cep || ''));
      inst._marker = m;
    }
  });
  if (referencePoint) {
    if (refMarker) map.removeLayer(refMarker);
    refMarker = L.marker(referencePoint, { icon: pinkIcon() }).addTo(map);
    refMarker.bindPopup('Sua localização');
  }
}

function focusMapOnResults() {
  const pts = filteredInstitutions.filter(i => i._latlng).map(i => i._latlng);
  if (referencePoint) pts.push(referencePoint);
  if (pts.length === 0) return;
  if (pts.length === 1) { map.setView(pts[0], 13); return; }
  const bounds = L.latLngBounds(pts);
  map.fitBounds(bounds.pad(0.2));
}

function detectCategories(inst) {
  const text = normalize([
    inst.programa, inst.categoria, inst.tipo, inst.descricao,
    inst['programa de tratamento'], inst['tipo de prestacao'], inst['tipo de prestação']
  ].join(' '));
  const cats = [];
  if (text.includes('servico') || text.includes('serviço') || text.includes('prestacao de servico') || text.includes('prestação de serviço')) cats.push('Prestação de Serviços');
  if (text.includes('pecuniaria') || text.includes('pecuniária') || text.includes('financeira') || text.includes('doacao') || text.includes('doação')) cats.push('Prestação Pecuniária');
  if (text.includes('saude') || text.includes('saúde') || text.includes('tratamento') || text.includes('medic') || text.includes('dependencia') || text.includes('dependência') || text.includes('drogas')) cats.push('Programa de Saúde');
  if (text.includes('palestra') || text.includes('curso') || text.includes('educacao') || text.includes('educação') || text.includes('capacitacao') || text.includes('capacitação')) cats.push('Palestras');
  if (cats.length === 0) cats.push('Outros');
  return cats;
}

function buildAddressString(inst) {
  const parts = [
    inst.endereco || inst['endereço'] || inst.address,
    inst.numero || inst['número'] || inst.number,
    inst.bairro || inst.district,
    inst.cidade || inst.city || inst.municipio || inst['município'],
    inst.estado || inst.uf || inst.state,
    inst.cep,
    'Brasil'
  ].filter(p => p && p.toString().trim());
  return parts.join(', ');
}

async function geocodeAddress(address) {
  if (!address) return null;
  const cache = getCache();
  if (cache[address]) return cache[address];
  try {
    const url = NOMINATIM_BASE + '?format=json&limit=1&q=' + encodeURIComponent(address);
    const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
    if (!res.ok) return null;
    const data = await res.json();
    if (data && data.length > 0) {
      const loc = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      cache[address] = loc;
      setCache(cache);
      return loc;
    }
  } catch (e) { console.warn('Geocode error', e); }
  return null;
}

function applyFilters() {
  let list = allInstitutions.slice();

  if (searchTerm) {
    const s = normalize(searchTerm);
    list = list.filter(i => normalize(JSON.stringify(i)).includes(s));
  }

  if (activeCategory !== 'Todos') {
    list = list.filter(i => (i._categories || []).includes(activeCategory));
  }

  if (radiusKm > 0 && referencePoint) {
    list = list.filter(i => {
      if (!i._latlng) return false;
      const d = haversineKm(referencePoint, i._latlng);
      i._distance = d;
      return d !== null && d <= radiusKm;
    });
  } else {
    list.forEach(i => { if (i._latlng && referencePoint) i._distance = haversineKm(referencePoint, i._latlng); else i._distance = null; });
  }

  if (referencePoint) {
    list.sort((a, b) => {
      const da = a._distance === null ? Infinity : a._distance;
      const db = b._distance === null ? Infinity : b._distance;
      return da - db;
    });
  }

  filteredInstitutions = list;
  renderList();
  renderMarkers();
  updateStatus();
}

function updateStatus() {
  document.getElementById('statusBar').textContent =
    filteredInstitutions.length + ' instituiç' + (filteredInstitutions.length === 1 ? 'ão' : 'ões') + ' encontrada' + (filteredInstitutions.length === 1 ? '' : 's');
}

function renderList() {
  const container = document.getElementById('results');
  if (filteredInstitutions.length === 0) {
    container.innerHTML = '<div class="empty">Nenhuma instituição encontrada com os filtros atuais.</div>';
    return;
  }
  container.innerHTML = filteredInstitutions.map(inst => {
    const cats = inst._categories || [];
    const badges = cats.map(c => {
      const cls = categoryColors[c] || 'outros';
      return '<span class="badge ' + cls + '">' + c + '</span>';
    }).join('');
    const dist = (inst._distance !== null && inst._distance !== undefined)
      ? '<div class="dist">📍 ' + inst._distance.toFixed(1) + ' km de distância</div>' : '';
    return '<div class="card">' +
      '<h3>' + escapeHtml(inst.nome || inst.name || 'Instituição') + '</h3>' +
      '<div class="addr">' + escapeHtml(inst.endereco || inst['endereço'] || '') + '</div>' +
      '<div class="cep">CEP: ' + escapeHtml(inst.cep || '') + '</div>' +
      '<div class="horario">Horário: ' + escapeHtml(inst.horario || inst['horário de funcionamento'] || inst['horario de funcionamento'] || 'Não informado') + '</div>' +
      dist +
      '<div class="badges">' + badges + '</div>' +
      '<a class="link-map" data-id="' + (inst._id) + '">Ver no Mapa</a>' +
    '</div>';
  }).join('');

  container.querySelectorAll('.link-map').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const id = a.getAttribute('data-id');
      const inst = filteredInstitutions.find(i => String(i._id) === String(id));
      if (inst && inst._latlng) {
        map.setView(inst._latlng, 15);
        if (inst._marker) inst._marker.openPopup();
      }
    });
  });
}

function escapeHtml(s) {
  return (s || '').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function normalizeRow(row) {
  const obj = {};
  Object.keys(row).forEach(k => {
    const nk = k.toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_');
    obj[nk] = row[k];
  });
  return obj;
}

function mapFields(r) {
  const get = (keys) => {
    for (const k of keys) { if (r[k] !== undefined && r[k] !== null && r[k].toString().trim() !== '') return r[k].toString().trim(); }
    return '';
  };
  return {
    nome: get(['nome','nome_da_instituicao','instituicao','razao_social','nome_da_entidade','organizacao','organização']),
    endereco: get(['endereco','endereço','logradouro','rua','av','avenida']),
    numero: get(['numero','número','num']),
    bairro: get(['bairro','regiao','região']),
    cidade: get(['cidade','municipio','município','localidade']),
    estado: get(['estado','uf','sigla_uf']),
    cep: get(['cep','codigo_postal']),
    horario: get(['horario','horário','horario_de_funcionamento','horário_de_funcionamento','funcionamento','horario_funcionamento']),
    programa: get(['programa','programa_de_tratamento','tipo_de_programa','area','área','categoria','tipo','tipo_de_prestacao','tipo_de_prestação','descricao','descrição','observacao','observação'])
  };
}

async function loadCSV() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true, transformHeader: h => h.trim() });
    const rows = (parsed.data || []).filter(r => Object.values(r).some(v => v && v.toString().trim()));
    allInstitutions = rows.map((r, idx) => {
      const norm = normalizeRow(r);
      const mapped = mapFields(norm);
      mapped._id = idx;
      mapped._categories = detectCategories(mapped);
      mapped._addressString = buildAddressString(mapped);
      mapped._latlng = null;
      mapped._distance = null;
      return mapped;
    });

    // Render imediatamente (sem coords)
    applyFilters();

    // Geocodificação em segundo plano
    geocodeInBackground();
  } catch (e) {
    console.error('Erro ao carregar CSV', e);
    document.getElementById('results').innerHTML =
      '<div class="empty">Erro ao carregar a planilha. Verifique sua conexão e tente novamente.<br><small>' + escapeHtml(e.message) + '</small></div>';
  }
}

async function geocodeInBackground() {
  const cache = getCache();
  for (const inst of allInstitutions) {
    if (inst._latlng) continue;
    const addr = inst._addressString;
    if (!addr) continue;
    if (cache[addr]) {
      inst._latlng = cache[addr];
      applyFilters();
      continue;
    }
    // Respeita limite do Nominatim (1 req/seg)
    const loc = await geocodeAddress(addr);
    if (loc) {
      inst._latlng = loc;
      applyFilters();
    }
    await new Promise(r => setTimeout(r, 1100));
  }
}

async function setReferenceByQuery(query) {
  if (!query) return;
  const loc = await geocodeAddress(query + ', Brasil');
  if (loc) {
    referencePoint = loc;
    applyFilters();
    focusMapOnResults();
  } else {
    alert('Localização não encontrada: ' + query);
  }
}

function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    applyFilters();
  });
  document.getElementById('searchBtn').addEventListener('click', () => applyFilters());

  document.getElementById('locationBtn').addEventListener('click', () => {
    const v = document.getElementById('locationInput').value.trim();
    if (v) setReferenceByQuery(v);
  });
  document.getElementById('locationInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const v = document.getElementById('locationInput').value.trim();
      if (v) setReferenceByQuery(v);
    }
  });

  document.getElementById('gpsBtn').addEventListener('click', () => {
    if (!navigator.geolocation) { alert('Geolocalização não suportada.'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      referencePoint = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      applyFilters();
      focusMapOnResults();
    }, err => alert('Não foi possível obter sua localização: ' + err.message),
    { enableHighAccuracy: true, timeout: 10000 });
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('locationInput').value = '';
    searchTerm = '';
    referencePoint = null;
    if (refMarker) { map.removeLayer(refMarker); refMarker = null; }
    document.getElementById('radiusSlider').value = 0;
    radiusKm = 0;
    document.getElementById('radiusLabel').textContent = 'Sem limite';
    activeCategory = 'Todos';
    updatePillsUI();
    applyFilters();
    focusMapOnResults();
  });

  const slider = document.getElementById('radiusSlider');
  slider.addEventListener('input', (e) => {
    const v = parseInt(e.target.value, 10);
    radiusKm = v;
    document.getElementById('radiusLabel').textContent = v === 0 ? 'Sem limite' : ('Raio: ' + v + ' km');
    applyFilters();
  });

  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      activeCategory = p.getAttribute('data-cat');
      updatePillsUI();
      applyFilters();
    });
  });
}

function updatePillsUI() {
  document.querySelectorAll('.pill').forEach(p => {
    const cat = p.getAttribute('data-cat');
    if (cat === activeCategory) { p.classList.add('active'); p.classList.remove('inactive'); }
    else { p.classList.remove('active'); p.classList.add('inactive'); }
  });
}

window.addEventListener('DOMContentLoaded', () => {
