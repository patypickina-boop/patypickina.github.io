<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Parceiros Sema - MPDFT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --mpdft-blue: #004a8e;
            --mpdft-light-blue: #e6eff8;
        }
        .bg-mpdft { background-color: var(--mpdft-blue); }
        .text-mpdft { color: var(--mpdft-blue); }
        #map { height: 400px; width: 100%; z-index: 1; }
        .card-shadow { box-shadow: 0 2px 15px -3px rgba(0,0,0,0.07), 0 10px 20px -2px rgba(0,0,0,0.04); }
        .loader { border-top-color: var(--mpdft-blue); animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Header -->
    <header class="bg-mpdft text-white p-4 shadow-md">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-white p-1 rounded">
                    <img src="https://www.mpdft.mp.br/portal/images/logo_mpdft.png" alt="MPDFT" class="h-10">
                </div>
                <h1 class="text-xl font-bold uppercase tracking-wider">Localizador de Parceiros Sema</h1>
            </div>
            <div class="text-sm mt-2 md:mt-0 opacity-90">Ministério Público do Distrito Federal e Territórios</div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-6">
        
        <!-- Search & Filters -->
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Nome da Instituição</label>
                    <input type="text" id="searchName" placeholder="Ex: Asilo, Creche..." class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Programa</label>
                    <select id="filterProgram" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Todos</option>
                        <option value="Prestação de Pecuniária">Prestação de Pecuniária</option>
                        <option value="Prestação de Serviços">Prestação de Serviços</option>
                        <option value="Prestação de Bens">Prestação de Bens</option>
                        <option value="Programa de Saúde">Programa de Saúde</option>
                        <option value="Palestras">Palestras</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Localização (CEP ou Endereço)</label>
                    <div class="flex">
                        <input type="text" id="searchLocation" placeholder="Digite seu CEP ou endereço" class="w-full border rounded-l p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                        <button id="btnSearchLoc" class="bg-mpdft text-white px-4 rounded-r hover:bg-blue-800 transition">Buscar</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Observações / Restrições</label>
                    <input type="text" id="searchObs" placeholder="Buscar em observações..." class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="flex items-center space-x-6 pt-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="checkWeekend" class="w-4 h-4 text-blue-600">
                        <span class="text-sm">Fins de Semana</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="checkNight" class="w-4 h-4 text-blue-600">
                        <span class="text-sm">Período Noturno (18h+)</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div id="progressContainer" class="hidden mb-6">
            <div class="flex justify-between text-xs mb-1">
                <span id="progressText">Geocodificando instituições...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Map Section -->
        <div class="rounded-lg overflow-hidden shadow-md mb-6 border border-gray-200">
            <div id="map"></div>
        </div>

        <!-- Results Section -->
        <div class="mb-4 flex justify-between items-end">
            <h2 class="text-xl font-bold text-mpdft">Instituições Encontradas (<span id="countResults">0</span>)</h2>
            <p class="text-sm text-gray-500" id="userLocationText">Mostrando resultados globais</p>
        </div>

        <div id="resultsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
        </div>

        <div id="emptyState" class="hidden text-center py-20">
            <p class="text-gray-500 text-lg">Nenhuma instituição encontrada com os filtros selecionados.</p>
        </div>

    </main>

    <footer class="bg-gray-100 border-t mt-12 py-6 text-center text-sm text-gray-600">
        <p>&copy; 2023 MPDFT - Secretaria de Medidas Alternativas (SEMA)</p>
    </footer>

    <script>
        // Configuration
        const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';
        
        // State
        let institutions = [];
        let userCoords = null;
        let map, markersLayer;
        const geoCache = JSON.parse(localStorage.getItem('sema_geo_cache') || '{}');

        // Initialize Map
        function initMap() {
            map = L.map('map').setView([-15.7942, -47.8822], 11); // Brasilia
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        // Haversine Distance
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Geocoding with Cache and Rate Limiting
        async function geocodeAddress(address) {
            const cleanAddress = address.trim();
            if (geoCache[cleanAddress]) return geoCache[cleanAddress];

            try {
                const response = await fetch(`${NOMINATIM_URL}?format=json&q=${encodeURIComponent(cleanAddress + ', Distrito Federal, Brasil')}&limit=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const result = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                    geoCache[cleanAddress] = result;
                    localStorage.setItem('sema_geo_cache', JSON.stringify(geoCache));
                    return result;
                }
            } catch (e) {
                console.error("Geocoding error for: " + address, e);
            }
            return null;
        }

        // Load Data
        async function loadData() {
            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: async (results) => {
                        const rawData = results.data;
                        document.getElementById('progressContainer').classList.remove('hidden');
                        
                        const processed = [];
                        for (let i = 0; i < rawData.length; i++) {
                            const item = rawData[i];
                            // Map columns based on expected names (adjust if sheet headers differ)
                            const inst = {
                                id: i,
                                nome: item['Nome'] || item['Instituição'] || 'Sem Nome',
                                endereco: item['Endereço'] || '',
                                programa: item['Programa'] || '',
                                observacoes: item['Observações'] || '',
                                fimDeSemana: (item['Fim de Semana'] || '').toLowerCase().includes('sim'),
                                noturno: (item['Período Noturno'] || '').toLowerCase().includes('sim'),
                                lat: null,
                                lon: null
                            };

                            // Geocode if address exists
                            if (inst.endereco) {
                                // Small delay to respect Nominatim (1 req/sec) if not in cache
                                if (!geoCache[inst.endereco.trim()]) {
                                    await new Promise(r => setTimeout(r, 1000));
                                }
                                const coords = await geocodeAddress(inst.endereco);
                                if (coords) {
                                    inst.lat = coords.lat;
                                    inst.lon = coords.lon;
                                }
                            }

                            processed.push(inst);
                            
                            // Update Progress
                            const percent = Math.round(((i + 1) / rawData.length) * 100);
                            document.getElementById('progressBar').style.width = percent + '%';
                            document.getElementById('progressPercent').innerText = percent + '%';
                        }

                        institutions = processed;
                        document.getElementById('progressContainer').classList.add('hidden');
                        render();
                    }
                });
            } catch (error) {
                console.error("Error loading sheet:", error);
                alert("Erro ao carregar dados da planilha. Verifique a conexão.");
            }
        }

        // Render Results
        function render() {
            const nameFilter = document.getElementById('searchName').value.toLowerCase();
            const progFilter = document.getElementById('filterProgram').value;
            const obsFilter = document.getElementById('searchObs').value.toLowerCase();
            const weekendFilter = document.getElementById('checkWeekend').checked;
            const nightFilter = document.getElementById('checkNight').checked;

            let filtered = institutions.filter(inst => {
                const matchesName = inst.nome.toLowerCase().includes(nameFilter);
                const matchesProg = !progFilter || inst.programa.includes(progFilter);
                const matchesObs = inst.observacoes.toLowerCase().includes(obsFilter);
                const matchesWeekend = !weekendFilter || inst.fimDeSemana;
                const matchesNight = !nightFilter || inst.noturno;
                return matchesName && matchesProg && matchesObs && matchesWeekend && matchesNight;
            });

            // Calculate distances if user location is set
            if (userCoords) {
                filtered.forEach(inst => {
                    if (inst.lat && inst.lon) {
                        inst.distance = calculateDistance(userCoords.lat, userCoords.lon, inst.lat, inst.lon);
                    } else {
                        inst.distance = Infinity;
                    }
                });
                filtered.sort((a, b) => a.distance - b.distance);
            }

            // Update UI
            const listEl = document.getElementById('resultsList');
            const emptyEl = document.getElementById('emptyState');
            const countEl = document.getElementById('countResults');
            
            listEl.innerHTML = '';
            markersLayer.clearLayers();
            countEl.innerText = filtered.length;

            if (filtered.length === 0) {
                emptyEl.classList.remove('hidden');
            } else {
                emptyEl.classList.add('hidden');
                filtered.forEach(inst => {
                    // Add Card
                    const distText = inst.distance && inst.distance !== Infinity ? `${inst.distance.toFixed(1)} km` : 'Distância desconhecida';
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-lg border border-gray-100 card-shadow p-5 flex flex-col justify-between hover:border-blue-300 transition';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg text-mpdft leading-tight">${inst.nome}</h3>
                                <span class="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded">${distText}</span>
                            </div>
                            <p class="text-sm text-gray-600 mb-3"><span class="font-semibold">📍 Endereço:</span> ${inst.endereco}</p>
                            <p class="text-sm text-gray-600 mb-2"><span class="font-semibold">📋 Programa:</span> ${inst.programa}</p>
                            ${inst.observacoes ? `<p class="text-xs text-gray-500 italic border-t pt-2 mt-2">"${inst.observacoes}"</p>` : ''}
                            <div class="flex gap-2 mt-3">
                                ${inst.fimDeSemana ? '<span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full">Fim de Semana</span>' : ''}
                                ${inst.noturno ? '<span class="text-[10px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">Noturno</span>' : ''}
                            </div>
                        </div>
                        <button onclick="focusOnMap(${inst.lat}, ${inst.lon}, '${inst.nome.replace(/'/g, "\\'")}')" class="mt-4 w-full bg-gray-50 text-mpdft border border-mpdft py-2 rounded font-semibold hover:bg-mpdft hover:text-white transition text-sm">
                            📍 Ver no Mapa
                        </button>
                    `;
                    listEl.appendChild(card);

                    // Add Marker
                    if (inst.lat && inst.lon) {
                        L.marker([inst.lat, inst.lon])
                            .bindPopup(`<b>${inst.nome}</b><br>${inst.endereco}`)
                            .addTo(markersLayer);
                    }
                });
            }
        }

        function focusOnMap(lat, lon, name) {
            if (lat && lon) {
                map.setView([lat, lon], 16);
                window.scrollTo({ top: document.getElementById('map').offsetTop - 20, behavior: 'smooth' });
            } else {
                alert("Coordenadas não disponíveis para esta instituição.");
            }
        }

        // Search Location Handler
        async function handleLocationSearch() {
            const query = document.getElementById('searchLocation').value;
            if (!query) return;

            const btn = document.getElementById('btnSearchLoc');
            btn.disabled = true;
            btn.innerText = '...';

            const coords = await geocodeAddress(query);
            if (coords) {
                userCoords = coords;
                document.getElementById('userLocationText').innerText = `Perto de: ${query}`;
                map.setView([coords.lat, coords.lon], 13);
                
                // Add user marker
                L.circleMarker([coords.lat, coords.lon], { color: 'red', radius: 8 }).addTo(map).bindPopup("Sua busca").openPopup();
                
                render();
            } else {
                alert("Localização não encontrada.");
            }
            btn.disabled = false;
            btn.innerText = 'Buscar';
        }

        // Event Listeners
        document.getElementById('searchName').addEventListener('input', render);
        document.getElementById('filterProgram').addEventListener('change', render);
        document.getElementById('searchObs').addEventListener('input', render);
        document.getElementById('checkWeekend').addEventListener('change', render);
        document.getElementById('checkNight').addEventListener('change', render);
        document.getElementById('btnSearchLoc').addEventListener('click', handleLocationSearch);
        document.getElementById('searchLocation').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLocationSearch();
        });

        // Init
        window.onload = () => {
            initMap();
            loadData();
        };
    </script>
</body>
</html>
