<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localizador de Parceiros Sema MPDFT</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      color: #1b2a4a;
    }
    header {
      background: linear-gradient(135deg, #0b3d91, #1565c0);
      color: #fff;
      padding: 18px 24px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    header h1 { font-size: 1.4rem; }
    header p { font-size: 0.9rem; opacity: 0.9; margin-top: 4px; }
    .container {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - 92px);
    }
    .panel {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      overflow-y: auto;
    }
    .panel h2 { font-size: 1rem; margin-bottom: 12px; color: #0b3d91; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin: 10px 0 4px; }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #c5cdd6;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .btn {
      background: #1565c0;
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 14px;
      width: 100%;
    }
    .btn:hover { background: #0b3d91; }
    .btn.secondary { background: #6c757d; margin-top: 8px; }
    .btn.secondary:hover { background: #565e64; }
    #map {
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      height: 100%;
      min-height: 400px;
    }
    .results { margin-top: 16px; }
    .result-item {
      border: 1px solid #e3e7ee;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.2s;
    }
    .result-item:hover { border-color: #1565c0; background: #f0f6ff; }
    .result-item h3 { font-size: 0.95rem; color: #0b3d91; }
    .result-item p { font-size: 0.8rem; margin-top: 4px; color: #44506b; }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 10px;
      margin-right: 4px;
      margin-top: 6px;
      background: #e3f2fd;
      color: #0b3d91;
    }
    .badge.weekend { background: #fff3cd; color: #856404; }
    .badge.night { background: #d1ecf1; color: #0c5460; }
    .status { font-size: 0.8rem; margin-top: 10px; color: #6c757d; }
    .distance { font-size: 0.78rem; color: #1565c0; font-weight: 600; margin-top: 4px; }
    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; height: auto; }
      #map { height: 50vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Localizador de Parceiros Sema MPDFT</h1>
    <p>Encontre instituições parceiras próximas a você.</p>
  </header>

  <div class="container">
    <aside class="panel">
      <h2>Filtros</h2>

      <label for="reference">Ponto de Referência (Endereço)</label>
      <input type="text" id="reference" placeholder="Ex.: Praça do Buriti, Gama - DF" />

      <label for="city">Cidade/UF</label>
      <input type="text" id="city" placeholder="Ex.: Brasília/DF" />

      <label for="program">Programa</label>
      <select id="program">
        <option value="">Todos</option>
        <option value="Pecuniária">Pecuniária</option>
        <option value="Serviços">Serviços</option>
        <option value="Palestras">Palestras</option>
        <option value="Saúde">Saúde</option>
      </select>

      <label for="weekend">Final de Semana</label>
      <select id="weekend">
        <option value="">Indiferente</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
      </select>

      <label for="night">Período Noturno</label>
      <select id="night">
        <option value="">Indiferente</option>
        <option value="Sim">Sim</option>
        <option value="Não">Não</option>
      </select>

      <button class="btn" id="searchBtn">Buscar Parceiros</button>
      <button class="btn secondary" id="clearBtn">Limpar Filtros</button>

      <div class="status" id="status"></div>

      <div class="results" id="results"></div>
    </aside>

    <main>
      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ===== Configuração da Planilha (Google Sheets publicada como CSV) =====
    const SPREADSHEET_ID = '1muZsxS4W9VOfdhfn4nxc1dFxskAPpOwUXIdpsfK4-Ns';
    const SHEET_GID = '0'; // ajuste se a aba principal tiver outro GID
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`;

    // ===== Mapa =====
    const map = L.map('map').setView([-15.7801, -47.9292], 11); // Brasília/DF
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap', maxZoom: 19
    }).addTo(map);

    let parceiros = [];
    let markersLayer = L.layerGroup().addTo(map);
    let referenceMarker = null;
    let referencePoint = null;

    // ===== Utilitários =====
    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function normalize(text) {
      return (text || '').toString().trim().toLowerCase();
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371; // km
      const toRad = (v) => (v * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(a));
    }

    // ===== Parser CSV simples (suporta aspas e vírgulas internas) =====
    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        const next = text[i + 1];

        if (inQuotes) {
          if (c === '"' && next === '"') {
            field += '"';
            i++;
          } else if (c === '"') {
            inQuotes = false;
          } else {
            field += c;
          }
        } else {
          if (c === '"') {
            inQuotes = true;
          } else if (c === ',') {
            row.push(field);
            field = '';
          } else if (c === '\n' || c === '\r') {
            if (c === '\r' && next === '\n') i++;
            row.push(field);
            rows.push(row);
            row = [];
            field = '';
          } else {
            field += c;
          }
        }
      }
      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }
      return rows.filter(r => r.some(c => c.trim() !== ''));
    }

    // ===== Geocodificação via Nominatim =====
    async function geocode(address) {
      const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(address)}`;
      try {
        const resp = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        const data = await resp.json();
        if (data && data.length > 0) {
          return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        }
      } catch (e) {
        console.warn('Falha na geocodificação:', address, e);
      }
      return null;
    }

    // ===== Carregamento e mapeamento das colunas =====
    async function carregarParceiros() {
      setStatus('Carregando dados da planilha...');
      try {
        const resp = await fetch(CSV_URL);
        if (!resp.ok) throw new Error('Não foi possível acessar a planilha.');
        const text = await resp.text();
        const rows = parseCSV(text);
        if (rows.length < 2) throw new Error('Planilha vazia.');

        const headers = rows[0].map(h => h.trim());
        const idx = (name) => headers.findIndex(h => h.toLowerCase() === name.toLowerCase());

        const col = {
          nome: idx('Nome da Instituição'),
          endereco: idx('Endereço Completo'),
          cep: idx('CEP'),
          cidade: idx('Cidade/UF'),
          horario: idx('Horário de Funcionamento'),
          programa: idx('Programa (Pecuniária, Serviços, Palestras, Saúde)'),
          weekend: idx('Final de Semana (Sim/Não)'),
          night: idx('Período Noturno (Sim/Não)'),
          obs: idx('Observações / Restrições'),
          lat: idx('Latitude (Opcional)'),
          lon: idx('Longitude (Opcional)')
        };

        const lista = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const nome = col.nome >= 0 ? r[col.nome] : '';
          if (!nome || !nome.trim()) continue;

          const endereco = col.endereco >= 0 ? r[col.endereco] : '';
          const cep = col.cep >= 0 ? r[col.cep] : '';
          const cidade = col.cidade >= 0 ? r[col.cidade] : '';
          const horario = col.horario >= 0 ? r[col.horario] : '';
          const programa = col.programa >= 0 ? r[col.programa] : '';
          const weekend = col.weekend >= 0 ? r[col.weekend] : '';
          const night = col.night >= 0 ? r[col.night] : '';
          const obs = col.obs >= 0 ? r[col.obs] : '';
          const latRaw = col.lat >= 0 ? r[col.lat] : '';
          const lonRaw = col.lon >= 0 ? r[col.lon] : '';

          let lat = parseFloat(latRaw);
          let lon = parseFloat(lonRaw);
          if (isNaN(lat) || isNaN(lon)) {
            const enderecoCompleto = [endereco, cep, cidade].filter(Boolean).join(', ');
            const geo = await geocode(enderecoCompleto);
            if (geo) { lat = geo.lat; lon = geo.lon; }
          }

          lista.push({
            nome: nome.trim(),
            endereco: endereco.trim(),
            cep: cep.trim(),
            cidade: cidade.trim(),
            horario: horario.trim(),
            programa: programa.trim(),
            weekend: normalize(weekend),
            night: normalize(night),
            obs: obs.trim(),
            lat, lon
          });
        }

        parceiros = lista;
        setStatus(`${parceiros.length} parceiro(s) carregado(s).`);
        aplicarFiltros();
      } catch (e) {
        console.error(e);
        setStatus('Erro ao carregar: ' + e.message);
      }
    }

    // ===== Filtros e ordenação =====
    function aplicarFiltros() {
      const ref = document.getElementById('reference').value.trim();
      const city = normalize(document.getElementById('city').value);
      const program = normalize(document.getElementById('program').value);
      const weekend = normalize(document.getElementById('weekend').value);
      const night = normalize(document.getElementById('night').value);

      let filtrados = parceiros.filter(p => {
        if (city && !normalize(p.cidade).includes(city)) return false;
        if (program && !normalize(p.programa).includes(program)) return false;
        if (weekend && p.weekend !== weekend) return false;
        if (night && p.night !== night) return false;
        return true;
      });

      // Ordenação
      if (referencePoint) {
        filtrados = filtrados
          .filter(p => !isNaN(p.lat) && !isNaN(p.lon))
          .map(p => ({ ...p, distancia: haversine(referencePoint.lat, referencePoint.lon, p.lat, p.lon) }))
          .sort((a, b) => a.distancia - b.distancia);
      } else {
        filtrados.sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'));
      }

      renderizar(filtrados);
    }

    // ===== Renderização =====
    function renderizar(lista) {
      const results = document.getElementById('results');
      results.innerHTML = '';
      markersLayer.clearLayers();

      if (!lista.length) {
        results.innerHTML = '<p class="status">Nenhum parceiro encontrado com os filtros selecionados.</p>';
        return;
      }

      lista.forEach(p => {
        const item = document.createElement('div');
        item.className = 'result-item';

        const badges = [];
        if (p.weekend === 'sim') badges.push('<span class="badge weekend">Final de Semana</span>');
        if (p.night === 'sim') badges.push('<span class="badge night">Noturno</span>');
        if (p.programa) badges.push(`<span class="badge">${p.programa}</span>`);

        const dist = (typeof p.distancia === 'number') ?
          `<div class="distance">${p.distancia.toFixed(2)} km de distância</div>` : '';

        item.innerHTML = `
          <h3>${p.nome}</h3>
          <p>${p.endereco}${p.cep ? ' — CEP ' + p.cep : ''}</p>
          <p>${p.cidade}</p>
          ${p.horario ? `<p>Horário: ${p.horario}</p>` : ''}
          ${p.obs ? `<p>Obs.: ${p.obs}</p>` : ''}
          <div>${badges.join('')}</div>
          ${dist}
        `;

        item.addEventListener('click', () => {
          if (!isNaN(p.lat) && !isNaN(p.lon)) {
            map.setView([p.lat, p.lon], 15);
            L.popup().setLatLng([p.lat, p.lon]).setContent(`<strong>${p.nome}</strong><br>${p.endereco}`).openOn(map);
          }
        });

        results.appendChild(item);

        if (!isNaN(p.lat) && !isNaN(p.lon)) {
          const marker = L.marker([p.lat, p.lon]).addTo(markersLayer);
          marker.bindPopup(`<strong>${p.nome}</strong><br>${p.endereco}<br>${p.cidade}`);
        }
      });

      // Ajustar visualização do mapa
      const validos = lista.filter(p => !isNaN(p.lat) && !isNaN(p.lon));
      if (validos.length) {
        const bounds = L.latLngBounds(validos.map(p => [p.lat, p.lon]));
        if (referencePoint) bounds.extend([referencePoint.lat, referencePoint.lon]);
        map.fitBounds(bounds.pad(0.2));
      }
    }

    // ===== Buscar ponto de referência =====
    async function buscarReferencia() {
      const ref = document.getElementById('reference').value.trim();
      if (!ref) {
        referencePoint = null;
        if (referenceMarker) { map.removeLayer(referenceMarker); referenceMarker = null; }
        aplicarFiltros();
        return;
      }

      setStatus('Localizando ponto de referência...');
      const geo = await geocode(ref);
      if (geo) {
        referencePoint = geo;
        if (referenceMarker) map.removeLayer(referenceMarker);
        referenceMarker = L.marker([geo.lat, geo.lon], { icon: L.divIcon({ className: '', html: '📍', iconSize: [24, 24] }) })
          .addTo(map)
          .bindPopup('Ponto de referência');
        setStatus('Ponto de referência localizado.');
      } else {
        referencePoint = null;
        setStatus('Não foi possível localizar o ponto de referência.');
      }
      aplicarFiltros();
    }

    // ===== Eventos =====
    document.getElementById('searchBtn').addEventListener('click', async () => {
      await buscarReferencia();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('reference').value = '';
      document.getElementById('city').value = '';
      document.getElementById('program').value = '';
      document.getElementById('weekend').value = '';
      document.getElementById('night').value = '';
      referencePoint = null;
      if (referenceMarker) { map.removeLayer(referenceMarker); referenceMarker = null; }
      aplicarFiltros();
    });

    // ===== Inicialização =====
    carregarParceiros();
  </script>
</body>
</html>
