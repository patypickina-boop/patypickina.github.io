<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Parceiros Sema MPDFT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        #map { height: 400px; width: 100%; border-radius: 0.5rem; }
        .card-list { max-height: 600px; overflow-y: auto; }
        .badge-weekend { background-color: #10b981; color: white; }
        .badge-night { background-color: #6366f1; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="bg-blue-800 text-white p-6 shadow-lg">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-2xl font-bold">Localizador de Parceiros Sema MPDFT</h1>
            <p class="text-sm opacity-80">Sistema de Apoio às Medidas Alternativas</p>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <!-- Filtros -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8 grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Nome ou Programa</label>
                <input type="text" id="searchName" placeholder="Ex: Instituição X..." class="w-full border rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">CEP ou Endereço de Referência</label>
                <div class="flex gap-2">
                    <input type="text" id="searchLocation" placeholder="Ex: 70000-000" class="w-full border rounded-md p-2">
                    <button id="btnLocate" class="bg-blue-600 text-white px-3 rounded-md hover:bg-blue-700">📍</button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Observações / Restrições</label>
                <input type="text" id="searchObs" placeholder="Ex: Idosos, horta..." class="w-full border rounded-md p-2">
            </div>
            <div class="flex items-center gap-4 md:col-span-3">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="filterWeekend" class="w-4 h-4 text-blue-600">
                    <span>Final de Semana</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="filterNight" class="w-4 h-4 text-blue-600">
                    <span>Período Noturno (após 18h)</span>
                </label>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Mapa -->
            <div class="space-y-4">
                <div id="map" class="shadow-inner border"></div>
                <div id="status" class="text-sm text-gray-500 italic">Carregando dados...</div>
            </div>

            <!-- Lista -->
            <div class="card-list space-y-4" id="institutionList">
                <!-- Cards injetados via JS -->
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
        
        let map, userMarker, markersGroup;
        let institutions = [];
        let userCoords = null;
        const geoCache = JSON.parse(localStorage.getItem('sema_geocache') || '{}');

        // Inicializar Mapa
        function initMap() {
            map = L.map('map').setView([-15.7942, -47.8822], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            markersGroup = L.layerGroup().addTo(map);
        }

        // Haversine para distância
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Geocodificação Robusta
        async function geocode(address) {
            if (geoCache[address]) return geoCache[address];
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ', Distrito Federal, Brasil')}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const result = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                    geoCache[address] = result;
                    localStorage.setItem('sema_geocache', JSON.stringify(geoCache));
                    return result;
                }
            } catch (e) {
                console.error("Erro geocodificação:", e);
            }
            return null;
        }

        async function loadData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: async (results) => {
                    const rawData = results.data;
                    document.getElementById('status').innerText = "Processando localizações...";

                    for (let row of rawData) {
                        if (!row.Nome) continue;

                        let lat = parseFloat(row.Latitude);
                        let lon = parseFloat(row.Longitude);
                        
                        // Se coordenadas inválidas ou erro de conexão, tenta geocodificar
                        if (isNaN(lat) || isNaN(lon) || row.Latitude.includes('Erro')) {
                            const coords = await geocode(row.Endereço);
                            if (coords) {
                                lat = coords.lat;
                                lon = coords.lon;
                            }
                        }

                        institutions.push({
                            nome: row.Nome || 'Sem Nome',
                            endereco: row.Endereço || '',
                            programa: row.Programa || '',
                            observacoes: row['Observações'] || row['Restrições'] || '',
                            fds: (row['Final de Semana'] || '').toLowerCase() === 'sim',
                            noturno: (row['Período Noturno'] || '').toLowerCase() === 'sim',
                            lat: lat,
                            lon: lon
                        });
                        
                        // Pequeno delay para não bloquear a UI e respeitar rate limit do Nominatim se necessário
                        if (institutions.length % 5 === 0) await new Promise(r => setTimeout(r, 100));
                    }

                    document.getElementById('status').innerText = `${institutions.length} instituições carregadas.`;
                    render();
                }
            });
        }

        function render() {
            const searchName = document.getElementById('searchName').value.toLowerCase();
            const searchObs = document.getElementById('searchObs').value.toLowerCase();
            const filterWeekend = document.getElementById('filterWeekend').checked;
            const filterNight = document.getElementById('filterNight').checked;

            let filtered = institutions.filter(inst => {
                const matchesName = inst.nome.toLowerCase().includes(searchName) || inst.programa.toLowerCase().includes(searchName);
                const matchesObs = inst.observacoes.toLowerCase().includes(searchObs);
                const matchesFds = !filterWeekend || inst.fds;
                const matchesNight = !filterNight || inst.noturno;
                return matchesName && matchesObs && matchesFds && matchesNight;
            });

            // Calcular distâncias se houver ponto de referência
            if (userCoords) {
                filtered.forEach(inst => {
                    if (inst.lat && inst.lon) {
                        inst.distance = calculateDistance(userCoords.lat, userCoords.lon, inst.lat, inst.lon);
                    } else {
                        inst.distance = Infinity;
                    }
                });
                filtered.sort((a, b) => a.distance - b.distance);
            } else {
                filtered.sort((a, b) => a.nome.localeCompare(b.nome));
            }

            renderList(filtered);
            updateMarkers(filtered);
        }

        function renderList(list) {
            const container = document.getElementById('institutionList');
            container.innerHTML = '';

            if (list.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-10">Nenhuma instituição encontrada com os filtros atuais.</p>';
                return;
            }

            list.forEach(inst => {
                const distText = inst.distance && inst.distance !== Infinity ? `${inst.distance.toFixed(2)} km` : 'Distância desconhecida';
                const card = document.createElement('div');
                card.className = 'bg-white p-4 rounded-lg shadow border-l-4 border-blue-600 hover:shadow-md transition-shadow';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-lg text-blue-900">${inst.nome}</h3>
                        <span class="text-xs font-semibold text-gray-500">${distText}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-1"><strong>Endereço:</strong> ${inst.endereco}</p>
                    <p class="text-sm text-gray-600 mb-1"><strong>Programa:</strong> ${inst.programa}</p>
                    ${inst.observacoes ? `<p class="text-sm text-gray-700 italic mt-2 bg-gray-50 p-2 rounded">"${inst.observacoes}"</p>` : ''}
                    <div class="mt-3 flex flex-wrap gap-2">
                        ${inst.fds ? '<span class="badge-weekend text-[10px] px-2 py-1 rounded-full uppercase font-bold">Fim de Semana</span>' : ''}
                        ${inst.noturno ? '<span class="badge-night text-[10px] px-2 py-1 rounded-full uppercase font-bold">Noturno</span>' : ''}
                    </div>
                `;
                card.onclick = () => {
                    if (inst.lat && inst.lon) map.setView([inst.lat, inst.lon], 16);
                };
                container.appendChild(card);
            });
        }

        function updateMarkers(list) {
            markersGroup.clearLayers();
            const bounds = [];
            
            list.forEach(inst => {
                if (inst.lat && inst.lon) {
                    const marker = L.marker([inst.lat, inst.lon])
                        .bindPopup(`<b>${inst.nome}</b><br>${inst.programa}`);
                    markersGroup.addLayer(marker);
                    bounds.push([inst.lat, inst.lon]);
                }
            });

            if (userMarker) markersGroup.addLayer(userMarker);

            if (bounds.length > 0 && !userCoords) {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        // Eventos
        document.getElementById('searchName').addEventListener('input', render);
        document.getElementById('searchObs').addEventListener('input', render);
        document.getElementById('filterWeekend').addEventListener('change', render);
        document.getElementById('filterNight').addEventListener('change', render);

        document.getElementById('btnLocate').onclick = async () => {
            const loc = document.getElementById('searchLocation').value;
            if (!loc) {
                // Tentar GPS
                navigator.geolocation.getCurrentPosition(pos => {
                    userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    setUserMarker();
                });
                return;
            }
            
            const coords = await geocode(loc);
            if (coords) {
                userCoords = coords;
                setUserMarker();
            } else {
                alert("Não foi possível localizar este endereço.");
            }
        };

        function setUserMarker() {
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.circleMarker([userCoords.lat, userCoords.lon], {
                color: 'red', fillOpacity: 0.8, radius: 8
            }).addTo(map).bindPopup("Sua Referência");
            map.setView([userCoords.lat, userCoords.lon], 13);
            render();
        }

        // Init
        window.onload = () => {
            initMap();
            loadData();
        };
    </script>
</body>
</html>
