<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localizador de Parceiros Sema MPDFT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
  html, body { height: 100%; background: #f4f6f9; color: #1a1a1a; }

  #app { display: flex; height: 100vh; width: 100%; overflow: hidden; }

  /* Sidebar */
  #sidebar {
    width: 380px; min-width: 380px; height: 100%;
    background: #ffffff; border-right: 1px solid #e1e5ea;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #sidebar header {
    padding: 18px 20px; background: #0b3d91; color: #fff;
  }
  #sidebar header h1 { font-size: 18px; font-weight: 700; line-height: 1.2; }
  #sidebar header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .quick-filters {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 16px;
    border-bottom: 1px solid #eef1f5; background: #fafbfc;
  }
  .quick-filters button {
    border: 1px solid #d8dee8; background: #fff; color: #334155;
    padding: 6px 10px; border-radius: 16px; font-size: 12px; cursor: pointer;
    transition: all .15s ease;
  }
  .quick-filters button:hover { border-color: #0b3d91; color: #0b3d91; }
  .quick-filters button.active { background: #0b3d91; color: #fff; border-color: #0b3d91; }

  .search-box {
    padding: 12px 16px; border-bottom: 1px solid #eef1f5;
  }
  .search-input-wrapper {
    position: relative; display: flex; align-items: center;
    border: 1px solid #d8dee8; border-radius: 8px; background: #fff; overflow: hidden;
  }
  .search-input-wrapper .icon { padding: 0 10px; color: #6b7280; font-size: 16px; }
  .search-input-wrapper input {
    flex: 1; border: none; outline: none; padding: 10px 4px; font-size: 13px; background: transparent;
  }
  .search-input-wrapper .gps-btn {
    border: none; background: transparent; cursor: pointer; padding: 0 12px; color: #0b3d91; font-size: 16px;
  }
  .search-input-wrapper .gps-btn:hover { color: #082c6b; }

  .cep-btn {
    width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 8px;
    background: #0b3d91; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .15s ease;
  }
  .cep-btn:hover { background: #082c6b; }
  .cep-btn:disabled { background: #9aa3b2; cursor: not-allowed; }

  .toggle-filters { padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #eef1f5; }
  .toggle-filters label {
    display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #334155; cursor: pointer;
    background: #f1f5f9; padding: 5px 10px; border-radius: 14px;
  }
  .toggle-filters input { cursor: pointer; }

  #status-bar { padding: 8px 16px; font-size: 12px; color: #6b7280; border-bottom: 1px solid #eef1f5; min-height: 32px; }
  #status-bar.error { color: #b91c1c; }
  #status-bar.success { color: #15803d; }

  #list { flex: 1; overflow-y: auto; padding: 10px 12px; }
  .card {
    background: #fff; border: 1px solid #e5e9ef; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px; cursor: pointer; transition: box-shadow .15s ease, transform .1s ease;
  }
  .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .card .name { font-weight: 700; font-size: 14px; color: #0f172a; margin-bottom: 4px; }
  .card .addr { font-size: 12px; color: #475569; margin-bottom: 4px; }
  .card .hours { font-size: 12px; color: #334155; margin-bottom: 6px; }
  .card .distance { font-size: 13px; font-weight: 700; color: #0b3d91; margin-bottom: 6px; }
  .card .badges { display: flex; flex-wrap: wrap; gap: 5px; }
  .badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .badge.tipo { background: #dbeafe; color: #1e40af; }
  .badge.fim-semana { background: #fef3c7; color: #92400e; }
  .badge.noturno { background: #ede9fe; color: #5b21b6; }
  .badge.saude { background: #dcfce7; color: #166534; }

  #map { flex: 1; height: 100%; }

  .loading { text-align: center; padding: 20px; color: #6b7280; font-size: 13px; }

  @media (max-width: 768px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; height: 55%; }
    #map { height: 45%; }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <header>
      <h1>Localizador de Parceiros Sema MPDFT</h1>
      <p>Encontre instituições parceiras próximas a você</p>
    </header>

    <div class="quick-filters" id="quickFilters">
      <button data-filter="todos" class="active">Todos</button>
      <button data-filter="Prestação de Serviços">Prestação de Serviços</button>
      <button data-filter="Prestação Pecuniária">Prestação Pecuniária</button>
      <button data-filter="Programa de Saúde">Programa de Saúde</button>
      <button data-filter="Palestras">Palestras</button>
    </div>

    <div class="search-box">
      <div class="search-input-wrapper">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar por nome, endereço, CEP, horário ou dia" />
        <button class="gps-btn" id="gpsBtn" title="Usar minha localização">📍</button>
      </div>
      <button class="cep-btn" id="cepBtn">Buscar por CEP/Endereço</button>
    </div>

    <div class="toggle-filters">
      <label><input type="checkbox" id="filterFimSemana" /> Fim de Semana</label>
      <label><input type="checkbox" id="filterNoturno" /> Noturno</label>
    </div>

    <div id="status-bar">Carregando instituições...</div>

    <div id="list">
      <div class="loading">Aguarde, carregando...</div>
    </div>
  </aside>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

const GEOCACHE_KEY = 'sema_mpdft_geocache_v1';
const REF_KEY = 'sema_mpdft_ref_v1';

let institutions = [];
let map, markersLayer;
let referencePoint = null;
let referenceMarker = null;
let activeQuickFilter = 'todos';
let searchText = '';
let filterFimSemana = false;
let filterNoturno = false;

const statusEl = document.getElementById('status-bar');
const listEl = document.getElementById('list');
const searchInput = document.getElementById('searchInput');
const cepBtn = document.getElementById('cepBtn');
const gpsBtn = document.getElementById('gpsBtn');

/* ---------- Map ---------- */
function initMap() {
  map = L.map('map').setView([-15.7939, -47.8828], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

/* ---------- Geocoding cache ---------- */
function getGeoCache() {
  try { return JSON.parse(localStorage.getItem(GEOCACHE_KEY) || '{}'); }
  catch { return {}; }
}
function setGeoCacheEntry(key, value) {
  const cache = getGeoCache();
  cache[key] = value;
  localStorage.setItem(GEOCACHE_KEY, JSON.stringify(cache));
}

/* ---------- Nominatim geocoding ---------- */
async function nominatimSearch(query) {
  const url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=' + encodeURIComponent(query);
  const res = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
  if (!res.ok) throw new Error('Nominatim HTTP ' + res.status);
  const data = await res.json();
  if (!data || data.length === 0) return null;
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
}

async function geocodeReference(rawInput) {
  const input = (rawInput || '').trim();
  if (!input) return null;

  // 1) Tenta com sufixo DF/Brasil
  try {
    const r = await nominatimSearch(input + ', Distrito Federal, Brasil');
    if (r) return r;
  } catch (e) { /* continua */ }

  // 2) Tenta apenas o CEP (se for numérico/CEP-like)
  const cepOnly = input.match(/\d{5}-?\d{3}/);
  if (cepOnly) {
    try {
      const r = await nominatimSearch(cepOnly[0]);
      if (r) return r;
    } catch (e) { /* continua */ }
  }

  // 3) Tenta o input puro
  try {
    const r = await nominatimSearch(input);
    if (r) return r;
  } catch (e) { /* continua */ }

  return null;
}

async function geocodeInstitution(address, name) {
  const key = (address + '|' + name).toLowerCase().trim();
  const cache = getGeoCache();
  if (cache[key]) return cache[key];

  const queries = [
    (address + ', Distrito Federal, Brasil'),
    (name + ', Distrito Federal, Brasil'),
    (address + ', Brasil')
  ];

  for (const q of queries) {
    try {
      const r = await nominatimSearch(q);
      if (r) {
        setGeoCacheEntry(key, r);
        return r;
      }
    } catch (e) { /* tenta próximo */ }
    await sleep(1100); // respeitar rate limit do Nominatim
  }
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ---------- Distance ---------- */
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function formatKm(km) {
  if (km == null || isNaN(km)) return '';
  return km.toFixed(1).replace('.', ',') + ' km';
}

/* ---------- Sheet parsing ---------- */
async function loadSheet() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
  const cols = json.table.cols.map(c => (c.label || '').trim().toLowerCase());
  const rows = json.table.rows;

  return rows.map(r => {
    const obj = {};
    (r.c || []).forEach((cell, i) => {
      const label = cols[i] || ('col' + i);
      obj[label] = cell && cell.v != null ? String(cell.v) : '';
    });
    return obj;
  }).filter(r => Object.keys(r).length > 0);
}

function normalizeInstitution(row) {
  const get = (...keys) => {
    for (const k of keys) {
      const lk = k.toLowerCase();
      if (row[lk] != null && row[lk] !== '') return row[lk];
    }
    return '';
  };

  const name = get('nome', 'instituicao', 'razao social', 'parceiro');
  const address = get('endereco', 'endereço', 'logradouro', 'local');
  const hours = get('horario', 'horário', 'funcionamento', 'hora');
  const day = get('dia', 'dias', 'data');
  const type = get('tipo', 'categoria', 'modalidade', 'prestacao');
  const cep = get('cep');
  const latRaw = get('latitude', 'lat');
  const lonRaw = get('longitude', 'lon', 'lng', 'long');

  let lat = parseFloat(latRaw), lon = parseFloat(lonRaw);
  if (isNaN(lat) || isNaN(lon)) { lat = null; lon = null; }

  const fullText = (name + ' ' + address + ' ' + hours + ' ' + day + ' ' + type + ' ' + cep).toLowerCase();
  const isFimSemana = /s[aá]bado|domingo|s[aá]b|dom|fim de semana|fds/.test(fullText);
  const isNoturno = /noturno|noite|19h|20h|21h|22h|23h|18h/.test(fullText);

  return {
    name: name || 'Sem nome',
    address: address,
    cep: cep,
    hours: [hours, day].filter(Boolean).join(' - '),
    type: type,
    lat, lon,
    fimSemana: isFimSemana,
    noturno: isNoturno,
    distance: null
  };
}

/* ---------- Geocode all institutions ---------- */
async function geocodeInstitutions() {
  let done = 0;
  for (const inst of institutions) {
    if (inst.lat == null || inst.lon == null) {
      const geo = await geocodeInstitution(inst.address, inst.name);
      if (geo) { inst.lat = geo.lat; inst.lon = geo.lon; }
    }
    done++;
    statusEl.textContent = `Geocodificando endereços... ${done}/${institutions.length}`;
    statusEl.className = '';
    if (done % 5 === 0) renderList(); // atualiza parcialmente
  }
}

/* ---------- Filtering ---------- */
function applyFilters() {
  let list = institutions.slice();

  if (activeQuickFilter !== 'todos') {
    list = list.filter(i => (i.type || '').toLowerCase().includes(activeQuickFilter.toLowerCase()));
  }

  if (filterFimSemana) list = list.filter(i => i.fimSemana);
  if (filterNoturno) list = list.filter(i => i.noturno);

  if (searchText) {
    const q = searchText.toLowerCase();
    list = list.filter(i =>
      (i.name + ' ' + i.address + ' ' + i.hours + ' ' + i.type + ' ' + i.cep).toLowerCase().includes(q)
    );
  }

  // Sem limite de raio: apenas ordena por distância se houver ponto de referência
  if (referencePoint) {
    list = list.map(i => {
      if (i.lat != null && i.lon != null) {
        i.distance = haversineKm(referencePoint.lat, referencePoint.lon, i.lat, i.lon);
      } else {
        i.distance = null;
      }
      return i;
    });
    list.sort((a, b) => {
      if (a.distance == null) return 1;
      if (b.distance == null) return -1;
      return a.distance - b.distance;
    });
  }

  return list;
}

/* ---------- Render ---------- */
function renderList() {
  const list = applyFilters();
  listEl.innerHTML = '';

  if (list.length === 0) {
    listEl.innerHTML = '<div class="loading">Nenhuma instituição encontrada com os filtros atuais.</div>';
    renderMarkers(list);
    return;
  }

  list.forEach(inst => {
    const card = document.createElement('div');
    card.className = 'card';

    const distHtml = (referencePoint && inst.distance != null)
      ? `<div class="distance">📍 ${formatKm(inst.distance)}</div>` : '';

    const badges = [];
    if (inst.type) badges.push(`<span class="badge tipo">${escapeHtml(inst.type)}</span>`);
    if (inst.fimSemana) badges.push('<span class="badge fim-semana">Fim de Semana</span>');
    if (inst.noturno) badges.push('<span class="badge noturno">Noturno</span>');

    card.innerHTML = `
      <div class="name">${escapeHtml(inst.name)}</div>
      ${inst.address ? `<div class="addr">${escapeHtml(inst.address)}</div>` : ''}
      ${inst.hours ? `<div class="hours">🕒 ${escapeHtml(inst.hours)}</div>` : ''}
      ${distHtml}
      <div class="badges">${badges.join('')}</div>
    `;

    card.addEventListener('click', () => {
      if (inst.lat != null && inst.lon != null) {
        map.setView([inst.lat, inst.lon], 15);
        L.popup().setLatLng([inst.lat, inst.lon])
          .setContent(`<strong>${escapeHtml(inst.name)}</strong><br>${escapeHtml(inst.address || '')}`)
          .openOn(map);
      }
    });

    listEl.appendChild(card);
  });

  renderMarkers(list);
}

function renderMarkers(list) {
  markersLayer.clearLayers();
  list.forEach(inst => {
    if (inst.lat != null && inst.lon != null) {
      const m = L.marker([inst.lat, inst.lon]);
      m.bindPopup(`<strong>${escapeHtml(inst.name)}</strong><br>${escapeHtml(inst.address || '')}` +
        (inst.distance != null ? `<br><b>${formatKm(inst.distance)}</b>` : ''));
      m.addTo(markersLayer);
    }
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- Reference point ---------- */
function setReferencePoint(lat, lon, label) {
  referencePoint = { lat, lon };
  if (referenceMarker) map.removeLayer(referenceMarker);
  referenceMarker = L.marker([lat, lon], { icon: L.divIcon({ className: 'ref-icon', html: '📍', iconSize: [24,24] }) })
    .addTo(map);
  map.setView([lat, lon], 13);
  renderList();
  statusEl.textContent = 'Ponto de referência: ' + (label || `${lat.toFixed(5)}, ${lon.toFixed(5)}`);
  statusEl.className = 'success';
}

/* ---------- Events ---------- */
async function handleCepSearch() {
  const val = searchInput.value.trim();
  if (!val) {
    statusEl.textContent = 'Digite um CEP ou endereço para buscar.';
    statusEl.className = 'error';
    return;
  }
  cepBtn.disabled = true;
  cepBtn.textContent = 'Buscando...';
  statusEl.textContent = 'Geocodificando ponto de referência...';
  statusEl.className = '';

  try {
    const geo = await geocodeReference(val);
    if (geo) {
      setReferencePoint(geo.lat, geo.lon, geo.display);
    } else {
      statusEl.textContent = 'Não foi possível localizar o CEP/endereço informado. Tente novamente.';
      statusEl.className = 'error';
    }
  } catch (e) {
    statusEl.textContent = 'Erro na busca: ' + e.message;
    statusEl.className = 'error';
  } finally {
    cepBtn.disabled = false;
    cepBtn.textContent = 'Buscar por CEP/Endereço';
  }
}

function handleGps() {
  if (!navigator.geolocation) {
    statusEl.textContent = 'Geolocalização não suportada neste navegador.';
    statusEl.className = 'error';
    return;
  }
  statusEl.textContent = 'Obtendo sua localização...';
  statusEl.className = '';
  navigator.geolocation.getCurrentPosition(
    pos => setReferencePoint(pos.coords.latitude, pos.coords.longitude, 'Minha localização'),
    err => { statusEl.textContent = 'Erro ao obter localização: ' + err.message; statusEl.className = 'error'; },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

searchInput.addEventListener('input', () => {
  searchText = searchInput.value.trim();
  renderList();
});
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleCepSearch();
});
cepBtn.addEventListener('click', handleCepSearch);
gpsBtn.addEventListener('click', handleGps);

document.querySelectorAll('#quickFilters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#quickFilters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeQuickFilter = btn.dataset.filter;
    renderList();
  });
});

document.getElementById('filterFimSemana').addEventListener('change', e => {
  filterFimSemana = e.target.checked; renderList();
});
document.getElementById('filterNoturno').addEventListener('change', e => {
  filterNoturno = e.target.checked; renderList();
});

/* ---------- Init ---------- */
async function init() {
  initMap();
  try {
    statusEl.textContent = 'Carregando instituições da planilha...';
    const rows = await loadSheet();
    institutions = rows.map(normalizeInstitution);
    statusEl.textContent = `${institutions.length} instituições carregadas. Geocodificando...`;
    renderList();
    // Geocodifica em background (não bloqueia uso)
    geocodeInstitutions().then(() => {
      statusEl.textContent = `${institutions.length} instituições prontas. Digite um CEP ou use o GPS.`;
      statusEl.className = 'success';
      renderList();
    }).catch(() => {
      statusEl.textContent = 'Algumas instituições não puderam ser geocodificadas.';
      statusEl.className = 'error';
    });
  } catch (e) {
    statusEl.textContent = 'Erro ao carregar planilha: ' + e.message;
    statusEl.className = 'error';
    listEl.innerHTML = '<div class="loading">Falha ao carregar dados.</div>';
  }
}

init();
</script>
</body>
</html>
