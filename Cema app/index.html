<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador Parceiros Sema MPDFT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #eeeeee; --accent: #004a8e; }
        body.high-contrast { --bg: #ffffff; --text: #000000; --border: #000000; --accent: #000000; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }
        
        header { 
            background: #fff; padding: 10px 20px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 2px solid var(--border); z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        header img { height: 50px; }
        header h1 { font-size: 1.3rem; font-weight: 700; color: #000; }
        
        .btn-contrast { 
            background: #000; color: #fff; border: none; padding: 8px 15px; 
            border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: 700;
        }

        #main { display: flex; height: calc(100vh - 72px); }
        #sidebar { 
            width: 380px; background: var(--bg); display: flex; flex-direction: column; 
            border-right: 1px solid var(--border); box-shadow: 2px 0 5px rgba(0,0,0,0.05); 
        }
        
        .search-box { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-box input { 
            width: 100%; padding: 12px; border: 2px solid var(--border); 
            border-radius: 8px; font-size: 1rem; outline: none; color: #000; background: #fff;
        }

        #results { flex: 1; overflow-y: auto; padding: 15px; }
        .card { 
            background: #fff; border: 1px solid var(--border); border-radius: 10px; 
            padding: 15px; margin-bottom: 12px; transition: 0.2s; 
        }
        .card h3 { font-size: 1rem; margin-bottom: 5px; font-weight: 700; color: #000; }
        .card p { font-size: 0.85rem; margin-bottom: 8px; color: #333; }
        .dist-tag { color: var(--accent); font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 10px; }
        .btn-map { 
            background: var(--accent); color: #fff; border: none; padding: 8px; 
            border-radius: 5px; cursor: pointer; width: 100%; font-weight: 600;
        }

        #map { flex: 1; height: 100%; background: #f0f0f0; }
        .status-msg { padding: 10px 20px; font-size: 0.8rem; color: #888; background: #f9f9f9; border-bottom: 1px solid var(--border); }

        @media (max-width: 768px) {
            #main { flex-direction: column; }
            #sidebar { width: 100%; height: 45%; }
            #map { height: 55%; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <img src="https://adapta-one-prod.s3.sa-east-1.amazonaws.com/patypickina%40gmail.com/png/image-019f341b-1f13-710f-b3d7-0590792847b0.png" alt="Logo Sema">
        <h1>Localizador Parceiros Sema MPDFT</h1>
    </div>
    <button class="btn-contrast" onclick="toggleContrast()">ALTO CONTRASTE</button>
</header>

<div id="app">
    <div id="main">
        <aside id="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Busque por cidade, programa, CEP ou nome...">
            </div>
            <div id="status" class="status-msg">Carregando dados da planilha...</div>
            <div id="results"></div>
        </aside>
        <div id="map"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const NOMINATIM = 'https://nominatim.openstreetmap.org/search';

    let partners = [];
    let map, markersLayer;
    let userLoc = null;

    function toggleContrast() { document.body.classList.toggle('high-contrast'); }

    function initMap() {
        map = L.map('map').setView([-15.7942, -47.8822], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        markersLayer = L.layerGroup().addTo(map);
    }

    async function loadData() {
        try {
            const res = await fetch(GVIZ_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
            const rows = json.table.rows;
            
            partners = rows.map((r, idx) => ({
                id: idx,
                nome: r.c[0]?.v || 'Sem Nome',
                endereco: r.c[1]?.v || '',
                cidade: r.c[2]?.v || '',
                programa: r.c[4]?.v || '',
                obs: r.c[8]?.v || '',
                lat: null, lng: null, dist: 9999
            })).filter(p => p.nome !== 'Sem Nome');

            document.getElementById('status').innerText = `${partners.length} instituições carregadas. Localizando no mapa...`;
            await geocodeAll();
            render();
        } catch (e) {
            document.getElementById('status').innerHTML = '<b style="color:red">Erro ao carregar. Verifique se a planilha está "Publicada na Web".</b>';
        }
    }

    async function geocodeAll() {
        const cache = JSON.parse(localStorage.getItem('sema_cache_v5') || '{}');
        for (let p of partners) {
            const key = p.endereco.toLowerCase().trim();
            if (cache[key]) { p.lat = cache[key].lat; p.lng = cache[key].lng; }
            else {
                try {
                    const res = await fetch(`${NOMINATIM}?q=${encodeURIComponent(p.endereco + ', DF, Brasil')}&format=json&limit=1`);
                    const data = await res.json();
                    if (data[0]) {
                        p.lat = parseFloat(data[0].lat); p.lng = parseFloat(data[0].lon);
                        cache[key] = { lat: p.lat, lng: p.lng };
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        localStorage.setItem('sema_cache_v5', JSON.stringify(cache));
        document.getElementById('status').innerText = 'Sistema pronto. Busque por qualquer termo.';
    }

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function render() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';
        markersLayer.clearLayers();

        let filtered = partners.filter(p => 
            (p.nome + p.endereco + p.cidade + p.programa + p.obs).toLowerCase().includes(query)
        );

        if (userLoc) {
            filtered.forEach(p => { if(p.lat) p.dist = haversine(userLoc.lat, userLoc.lng, p.lat, p.lng); });
            filtered.sort((a, b) => a.dist - b.dist);
        }

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            const dist = p.dist < 9999 ? `<span class="dist-tag">📍 ${p.dist.toFixed(1)} km de distância</span>` : '';
            card.innerHTML = `
                ${dist}
                <h3>${p.nome}</h3>
                <p>${p.endereco}</p>
                <p><b>Programa:</b> ${p.programa}</p>
                <button class="btn-map" onclick="focusMap(${p.lat},${p.lng},'${p.nome}')">Ver no Mapa</button>
            `;
            resultsDiv.appendChild(card);
            if (p.lat) L.marker([p.lat, p.lng]).addTo(markersLayer).bindPopup(`<b>${p.nome}</b><br>${p.endereco}`);
        });
    }

    function focusMap(lat, lng, n) { 
        if(lat) { map.setView([lat, lng], 16); L.popup().setLatLng([lat, lng]).setContent(`<b>${n}</b>`).openOn(map); } 
    }

    document.getElementById('searchInput').addEventListener('input', render);
    navigator.geolocation.getCurrentPosition(pos => { 
        userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude }; 
        render(); 
    });

    initMap();
    loadData();
</script>
</body>
</html>
