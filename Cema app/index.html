<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localizador de Parceiros Sema MPDFT</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS/JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    html, body { height: 100%; margin: 0; font-family: 'Roboto', sans-serif; }
    #app { height: 100vh; display: flex; flex-direction: column; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
    .marker-pin { background: #1d4ed8; }
    .badge-programa { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 500; }
  </style>
</head>
<body class="bg-slate-100">
  <div id="app">
    <!-- Header -->
    <header class="bg-[#0b2a4a] text-white px-6 py-4 shadow-md z-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.828 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <circle cx="12" cy="11" r="3" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div>
          <h1 class="text-xl font-bold leading-tight">Localizador de Parceiros Sema MPDFT</h1>
          <p class="text-sm text-blue-100">Encontre instituições parceiras</p>
        </div>
      </div>
    </header>

    <!-- Conteúdo principal -->
    <div class="flex flex-1 overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-[420px] bg-white border-r border-slate-200 flex flex-col overflow-hidden">
        <div class="p-4 border-b border-slate-200 space-y-4">
          <!-- Filtros de Programa -->
          <div>
            <p class="text-xs font-semibold text-slate-500 uppercase mb-2">Programa</p>
            <div id="filtro-programas" class="flex flex-wrap gap-2"></div>
          </div>

          <!-- Busca textual -->
          <div>
            <p class="text-xs font-semibold text-slate-500 uppercase mb-2">Busca</p>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="7" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.3-4.3" />
                </svg>
              </span>
              <input id="input-busca" type="text"
                placeholder="Buscar por nome, endereço, CEP, horário ou dia"
                class="w-full pl-10 pr-10 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-600" />
              <button id="btn-gps" title="Usar minha localização"
                class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 p-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v3m0 14v3M2 12h3m14 0h3" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Buscar por CEP/Endereço -->
          <div class="flex items-center justify-between">
            <button id="btn-cep" class="bg-blue-700 hover:bg-blue-800 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
              Buscar por CEP/Endereço
            </button>
            <button id="btn-limpar" class="text-sm text-blue-700 hover:underline font-medium">Limpar</button>
          </div>
        </div>

        <!-- Contador -->
        <div class="px-4 py-2 bg-slate-50 border-b border-slate-200">
          <p id="contador" class="text-sm text-slate-600">Carregando instituições...</p>
        </div>

        <!-- Lista de cards -->
        <div id="lista" class="flex-1 overflow-y-auto scrollbar-thin p-3 space-y-3"></div>
      </aside>

      <!-- Mapa -->
      <main class="flex-1 relative">
        <div id="mapa" class="absolute inset-0"></div>
        <div id="status-geo" class="hidden absolute top-3 right-3 bg-white/95 shadow-lg rounded-lg px-3 py-2 text-xs text-slate-700 z-[1000] border border-slate-200"></div>
      </main>
    </div>
  </div>

  <script>
    // ===== Configurações =====
    const SPREADSHEET_ID = '179e4ywz97TK1_oCVbIy258SgTasQ-P0H6jnHKfB0Zgw';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=0`;
    const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';
    const CACHE_KEY = 'sema_mpdft_geocode_cache_v1';

    const PROGRAMAS = [
      'Todos',
      'Prestação de Serviços',
      'Prestação Pecuniária',
      'Programa de Saúde',
      'Palestras'
    ];

    const CORES_PROGRAMAS = {
      'Prestação de Serviços': 'bg-blue-100 text-blue-800',
      'Prestação Pecuniária': 'bg-emerald-100 text-emerald-800',
      'Programa de Saúde': 'bg-rose-100 text-rose-800',
      'Palestras': 'bg-amber-100 text-amber-800'
    };

    // ===== Estado =====
    let instituicoes = [];
    let programaSelecionado = 'Todos';
    let termoBusca = '';
    let origemUsuario = null; // {lat, lng}
    let mapa = null;
    let marcadores = [];
    let marcadorOrigem = null;

    // ===== Cache de geocodificação =====
    function carregarCache() {
      try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || {}; }
      catch { return {}; }
    }
    function salvarCache(cache) {
      try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch {}
    }

    // ===== Inicialização do mapa =====
    function initMapa() {
      mapa = L.map('mapa', { zoomControl: true }).setView([-15.7801, -47.9292], 11);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19
      }).addTo(mapa);
    }

    // ===== Carregar dados da planilha =====
    async function carregarPlanilha() {
      try {
        const resp = await fetch(SHEET_URL);
        const text = await resp.text();
        const json = JSON.parse(text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1));
        const rows = json.table.rows || [];
        const cols = json.table.cols || [];

        const header = cols.map(c => (c.label || '').trim());
        const findIdx = (nomes) => {
          const lower = nomes.map(n => n.toLowerCase());
          return header.findIndex(h => lower.includes(h.toLowerCase()));
        };

        const idxNome = findIdx(['nome', 'instituicao', 'razao social']);
        const idxEnd = findIdx(['endereco', 'endereço', 'rua']);
        const idxCep = findIdx(['cep']);
        const idxBairro = findIdx(['bairro']);
        const idxCidade = findIdx(['cidade', 'municipio']);
        const idxEstado = findIdx(['estado', 'uf']);
        const idxHorario = findIdx(['horario', 'horário', 'funcionamento']);
        const idxDia = findIdx(['dia', 'dias']);
        const idxPrograma = findIdx(['programa']);
        const idxLat = findIdx(['latitude', 'lat']);
        const idxLng = findIdx(['longitude', 'lng', 'lon']);

        instituicoes = rows.map((r, i) => {
          const c = r.c || [];
          const val = (idx) => idx >= 0 && c[idx] ? (c[idx].v || '').toString().trim() : '';
          return {
            id: i,
            nome: val(idxNome),
            endereco: val(idxEnd),
            cep: val(idxCep),
            bairro: val(idxBairro),
            cidade: val(idxCidade),
            estado: val(idxEstado),
            horario: val(idxHorario),
            dia: val(idxDia),
            programa: val(idxPrograma),
            lat: parseFloat(val(idxLat)) || null,
            lng: parseFloat(val(idxLng)) || null,
            latOk: false,
            lngOk: false
          };
        }).filter(it => it.nome || it.endereco);

        // Validar lat/lng existentes
        instituicoes.forEach(it => {
          if (it.lat !== null && it.lng !== null &&
              isFinite(it.lat) && isFinite(it.lng) &&
              Math.abs(it.lat) <= 90 && Math.abs(it.lng) <= 180) {
            it.latOk = true;
            it.lngOk = true;
          }
        });

        await geocodificarFaltantes();
        renderizar();
      } catch (err) {
        console.error('Erro ao carregar planilha:', err);
        document.getElementById('contador').textContent = 'Erro ao carregar a planilha.';
      }
    }

    // ===== Geocodificação via Nominatim =====
    function montarEndereco(it) {
      const partes = [it.endereco, it.bairro, it.cidade, it.estado, it.cep].filter(Boolean);
      return partes.join(', ');
    }

    async function geocodificarFaltantes() {
      const cache = carregarCache();
      const status = document.getElementById('status-geo');
      let pendentes = instituicoes.filter(it => !it.latOk || !it.lngOk);
      if (pendentes.length === 0) return;

      status.classList.remove('hidden');
      status.textContent = `Geocodificando endereços... 0/${pendentes.length}`;

      let count = 0;
      for (const it of pendentes) {
        const chave = montarEndereco(it).toLowerCase();
        if (!chave) { count++; continue; }

        if (cache[chave]) {
          it.lat = cache[chave].lat;
          it.lng = cache[chave].lng;
          it.latOk = true;
          it.lngOk = true;
        } else {
          try {
            const q = encodeURIComponent(montarEndereco(it));
            const url = `${NOMINATIM_URL}?format=json&q=${q}&limit=1&countrycodes=br`;
            const r = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
            const data = await r.json();
            if (data && data.length > 0) {
              it.lat = parseFloat(data[0].lat);
              it.lng = parseFloat(data[0].lon);
              it.latOk = true;
              it.lngOk = true;
              cache[chave] = { lat: it.lat, lng: it.lng };
              salvarCache(cache);
            }
            // Respeitar limite de uso do Nominatim
            await new Promise(res => setTimeout(res, 1100));
          } catch (e) {
            console.warn('Falha ao geocodificar:', chave, e);
          }
        }
        count++;
        status.textContent = `Geocodificando endereços... ${count}/${pendentes.length}`;
      }
      status.classList.add('hidden');
    }

    // ===== Filtros =====
    function filtrar() {
      let lista = instituicoes.slice();

      if (programaSelecionado !== 'Todos') {
        lista = lista.filter(it =>
          it.programa && it.programa.toLowerCase().includes(programaSelecionado.toLowerCase())
        );
      }

      if (termoBusca.trim()) {
        const t = termoBusca.toLowerCase().trim();
        lista = lista.filter(it =>
          [it.nome, it.endereco, it.cep, it.bairro, it.cidade, it.horario, it.dia, it.programa]
            .filter(Boolean)
            .some(v => v.toLowerCase().includes(t))
        );
      }

      // Ordenação por proximidade (sem limite de raio)
      if (origemUsuario) {
        lista = lista
          .filter(it => it.latOk && it.lngOk)
          .map(it => ({ ...it, _dist: distanciaKm(origemUsuario.lat, origemUsuario.lng, it.lat, it.lng) }))
          .sort((a, b) => a._dist - b._dist);
      }

      return lista;
    }

    function distanciaKm(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 +
                Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ===== Renderização =====
    function renderizar() {
      const lista = filtrar();
      const cont = document.getElementById('contador');
      cont.textContent = `${lista.length} instituição(ões) encontrada(s)`;

      const divLista = document.getElementById('lista');
      divLista.innerHTML = '';

      lista.forEach(it => {
        const card = document.createElement('div');
        card.className = 'bg-white border border-slate-200 rounded-lg p-3 hover:shadow-md transition cursor-pointer';

        const programas = (it.programa || '').split(/[,;|]/).map(p => p.trim()).filter(Boolean);
        const badges = programas.map(p => {
          const cor = CORES_PROGRAMAS[p] || 'bg-slate-100 text-slate-700';
          return `<span class="badge-programa ${cor}">${escapeHtml(p)}</span>`;
        }).join(' ');

        const distTxt = (origemUsuario && it._dist != null)
          ? `<span class="text-xs text-blue-700 font-medium">${it._dist.toFixed(1)} km</span>`
          : '';

        card.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <h3 class="font-bold text-slate-800 text-sm leading-snug">${escapeHtml(it.nome || 'Sem nome')}</h3>
            ${distTxt}
          </div>
          ${it.endereco ? `<p class="text-xs text-slate-600 mt-1">${escapeHtml(it.endereco)}${it.bairro ? ' - ' + escapeHtml(it.bairro) : ''}${it.cidade ? ', ' + escapeHtml(it.cidade) : ''}</p>` : ''}
          ${(it.horario || it.dia) ? `<p class="text-xs text-slate-500 mt-1">${escapeHtml([it.dia, it.horario].filter(Boolean).join(' • '))}</p>` : ''}
          ${badges ? `<div class="flex flex-wrap gap-1 mt-2">${badges}</div>` : ''}
        `;

        card.addEventListener('click', () => {
          if (it.latOk && it.lngOk) {
            mapa.setView([it.lat, it.lng], 15);
            mapa.eachLayer(l => {
              if (l instanceof L.CircleMarker && l.getLatLng().lat === it.lat && l.getLatLng().lng === it.lng) {
                l.openPopup();
              }
            });
          }
        });

        divLista.appendChild(card);
      });

      renderizarMarcadores(lista);
    }

    function renderizarMarcadores(lista) {
      marcadores.forEach(m => mapa.removeLayer(m));
      marcadores = [];

      lista.forEach(it => {
        if (!it.latOk || !it.lngOk) return;
        const marker = L.circleMarker([it.lat, it.lng], {
          radius: 8,
          color: '#1d4ed8',
          fillColor: '#1d4ed8',
          fillOpacity: 0.85,
          weight: 2
        }).addTo(mapa);

        const programas = (it.programa || '').split(/[,;|]/).map(p => p.trim()).filter(Boolean);
        marker.bindPopup(`
          <strong>${escapeHtml(it.nome || 'Sem nome')}</strong><br/>
          ${escapeHtml(it.endereco || '')}<br/>
          ${it.horario ? escapeHtml(it.horario) : ''}<br/>
          <em>${escapeHtml(programas.join(', '))}</em>
        `);
        marcadores.push(marker);
      });

      if (marcadores.length > 0 && !origemUsuario) {
        const group = L.featureGroup(marcadores);
        mapa.fitBounds(group.getBounds().pad(0.1));
      }
    }

    // ===== Geocodificar origem (CEP/Endereço) =====
    async function buscarOrigem() {
      const termo = document.getElementById('input-busca').value.trim();
      if (!termo) {
        alert('Digite um CEP ou endereço para buscar.');
        return;
      }
      const status = document.getElementById('status-geo');
      status.classList.remove('hidden');
      status.textContent = 'Localizando endereço...';
      try {
        const q = encodeURIComponent(termo.includes('Brasil') ? termo : termo + ', Brasil');
        const url = `${NOMINATIM_URL}?format=json&q=${q}&limit=1&countrycodes=br`;
        const r = await fetch(url, { headers: { 'Accept-Language': 'pt-BR' } });
        const data = await r.json();
        if (data && data.length > 0) {
          origemUsuario = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
          if (marcadorOrigem) mapa.removeLayer(marcadorOrigem);
          marcadorOrigem = L.marker([origemUsuario.lat, origemUsuario.lng], {
            icon: L.divIcon({
              className: '',
              html: '<div style="background:#ef4444;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 0 4px #000"></div>',
              iconSize: [18,18], iconAnchor: [9,9]
            })
          }).addTo(mapa).bindPopup('Sua localização');
          mapa.setView([origemUsuario.lat, origemUsuario.lng], 12);
          renderizar();
        } else {
          alert('Endereço não encontrado.');
        }
      } catch (e) {
        alert('Erro ao buscar endereço.');
      } finally {
        status.classList.add('hidden');
      }
    }

    function limparTudo() {
      document.getElementById('input-busca').value = '';
      termoBusca = '';
      origemUsuario = null;
      if (marcadorOrigem) { mapa.removeLayer(marcadorOrigem); marcadorOrigem = null; }
      renderizar();
    }

    // ===== Util =====
    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function renderBotoesPrograma() {
      const cont = document.getElementById('filtro-programas');
      cont.innerHTML = '';
      PROGRAMAS.forEach(p => {
        const btn = document.createElement('button');
        const ativo = p === programaSelecionado;
        btn.className = `text-xs font-medium px-3 py-1.5 rounded-full border transition ${ativo ? 'bg-blue-700 text-white border-blue-700' : 'bg-white text-slate-600 border-slate-300 hover:border-blue-400'}`;
        btn.textContent = p;
        btn.addEventListener('click', () => {
          programaSelecionado = p;
          renderBotoesPrograma();
          renderizar();
        });
        cont.appendChild(btn);
      });
    }

    // ===== Eventos =====
    document.getElementById('input-busca').addEventListener('input', (e) => {
      termoBusca = e.target.value;
      renderizar();
    });
    document.getElementById('btn-cep').addEventListener('click', buscarOrigem);
    document.getElementById('btn-limpar').addEventListener('click', limparTudo);
    document.getElementById('btn-gps').addEventListener('click', () => {
      if (!navigator.geolocation) { alert('Geolocalização não suportada.'); return; }
      const status = document.getElementById('status-geo');
      status.classList.remove('hidden');
      status.textContent = 'Obtendo sua localização...';
      navigator.geolocation.getCurrentPosition(pos => {
        origemUsuario = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        if (marcadorOrigem) mapa.removeLayer(marcadorOrigem);
        marcadorOrigem = L.marker([origemUsuario.lat, origemUsuario.lng], {
          icon: L.divIcon({
            className: '',
            html: '<div style="background:#ef4444;width:18px;height:18px;border-radius:50%;border:3px solid white;box-shadow:0 0 4px #000"></div>',
            iconSize: [18,18], iconAnchor: [9,9]
          })
        }).addTo(mapa).bindPopup('Sua localização');
        mapa.setView([origemUsuario.lat, origemUsuario.lng], 12);
        status.classList.add('hidden');
        renderizar();
      }, () => {
        status.classList.add('hidden');
        alert('Não foi possível obter sua localização.');
      });
    });

    // ===== Inicialização =====
    window.addEventListener('DOMContentLoaded', () => {
      initMapa();
      renderBotoesPrograma();
      carregarPlanilha();
    });
  </script>
</body>
</html>
